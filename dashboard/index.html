<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard · Xtent Innovations</title>
<style>
  /* ===================== Design tokens ===================== */
  :root{
    --paper:#f4f6fb;        /* cool app background        */
    --paper-2:#e8ecf5;      /* hover wash                 */
    --card:#ffffff;         /* panel surface              */
    --ink:#0e1726;          /* near-black navy text       */
    --ink-soft:#5b6678;     /* secondary text             */
    --line:#e3e8f1;         /* hairline rules             */
    --line-strong:#cfd6e4;
    --navy:#0b1b3a;         /* deep midnight navy         */
    --navy-2:#12244d;
    --accent:#1746e0;       /* electric indigo-blue       */
    --accent-soft:#4f74ff;
    --brand:#9b1c2e;        /* brand accent — dark red */
    --brand-deep:#7a1424;   /* deeper dark red for hover/press */
    --teal:#1746e0;         /* calendar / today accent (blue)        */
    --teal-soft:#4f74ff;
    --done:#0bbf8e;         /* completed → green (kept green on purpose:
                               red is the brand + "abandoned" colour, so a
                               red "completed" would be ambiguous)    */
    --postpone:#f5a524;     /* postponed → amber          */
    --abandon:#f1486b;      /* abandoned → coral-pink     */
    --shadow:0 12px 34px rgba(11,27,58,.16);
    --r:14px;
    --r-sm:9px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:"Inter","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:
      radial-gradient(900px 500px at 88% -10%, #e6ecfb 0%, transparent 55%),
      radial-gradient(700px 500px at 0% 110%, #fdecef 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
  }
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:20px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#b0a487;background-clip:content-box}

  /* ===================== App shell ===================== */
  .topbar{
    display:flex;align-items:center;gap:14px;
    padding:12px 20px;
    background:linear-gradient(110deg,var(--navy) 0%,var(--navy-2) 100%);
    border-bottom:1px solid rgba(255,255,255,.06);
    color:#fff;
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:600;letter-spacing:-0.01em}
  .brand .mark{
    width:38px;height:38px;border-radius:10px;flex:none;
    background:#fff;display:grid;place-items:center;padding:4px;
    box-shadow:0 4px 14px rgba(0,0,0,.22)
  }
  .brand .mark img{width:100%;height:100%;object-fit:contain;display:block}
  .brand h1{font-size:18px;margin:0;font-weight:700;color:#fff}
  .brand small{display:block;font-size:10.5px;color:#8ea2c8;font-weight:600;letter-spacing:1.2px}
  .topbar .spacer{flex:1}
  .file-controls{display:flex;align-items:center;gap:8px}
  .file-status{font-size:12px;color:#9fb2d6;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-status b{color:#ff9aae}
  .btn{
    border:1px solid var(--line-strong);background:var(--card);color:var(--ink);
    padding:8px 13px;border-radius:var(--r-sm);font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:.15s
  }
  .btn:hover{background:#fff;border-color:var(--accent-soft);box-shadow:0 2px 8px rgba(23,70,224,.12)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#1238c0;box-shadow:0 4px 14px rgba(23,70,224,.32)}
  .topbar .btn{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#eaf0fb}
  .topbar .btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);box-shadow:none}
  .topbar .btn.brandbtn{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
  .topbar .btn.brandbtn:hover{background:var(--brand-deep)}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--paper-2)}

  /* ===================== Layout grid ===================== */
  #root{display:flex;flex-direction:column;height:100vh;min-height:0}
  .layout{
    display:grid;
    grid-template-columns:minmax(300px,0.45fr) minmax(420px,0.55fr);
    grid-template-rows:minmax(0,0.78fr) minmax(0,1.22fr);
    gap:14px;padding:14px;
    flex:1;min-height:0;
  }
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:0 1px 2px rgba(11,27,58,.04), 0 8px 24px rgba(11,27,58,.05);
    display:flex;flex-direction:column;min-height:0;overflow:hidden
  }
  #projectPanel{grid-row:1 / span 2}
  #todoPanel{grid-column:2;grid-row:1}
  #calPanel{grid-column:2;grid-row:2}

  .panel-head{
    display:flex;align-items:center;gap:10px;
    padding:13px 16px;border-bottom:1px solid var(--line);
    background:#fff
  }
  .panel-head .title{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .panel-head .title .dot{width:8px;height:8px;border-radius:50%}
  .panel-head .spacer{flex:1}
  .panel-body{flex:1;min-height:0;overflow:auto;padding:14px 16px}

  /* ===================== Project switcher (dropdown) ===================== */
  .proj-select{
    font-family:inherit;font-size:14.5px;font-weight:700;color:var(--ink);
    background:#fff;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    padding:6px 30px 6px 11px;max-width:230px;cursor:pointer;
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235b6b8c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat:no-repeat;background-position:right 9px center;background-size:15px
  }
  .proj-select:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}

  /* ===================== Projects manager modal ===================== */
  .proj-mgr-add{display:flex;gap:8px;margin-bottom:16px}
  .proj-mgr-add input{
    flex:1;min-width:0;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink)
  }
  .proj-mgr-add input:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  .pm-head{margin:14px 0 8px;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-soft)}
  .pm-head:first-child{margin-top:0}
  .pm-empty{font-size:13.5px;color:var(--ink-soft);padding:4px 2px}
  .proj-row{
    display:flex;align-items:center;gap:10px;padding:9px 11px;margin-bottom:7px;
    border:1px solid var(--line);border-radius:9px;background:#fff
  }
  .proj-row.archived{background:var(--paper-2)}
  .proj-row .pr-name{flex:1;min-width:0;font-size:14px;font-weight:600;color:var(--ink);outline:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .proj-row.archived .pr-name{color:var(--ink-soft)}
  .proj-row .pr-name[contenteditable="true"]:focus{background:var(--paper-2);border-radius:5px;padding:1px 5px}
  .proj-row .pr-count{font-size:12px;color:var(--ink-soft);flex:none}
  .proj-row .btn{flex:none}

  /* tiny round icon buttons */
  .ibtn{
    width:28px;height:28px;border-radius:7px;border:1px solid transparent;
    background:transparent;color:var(--ink-soft);display:inline-grid;place-items:center;transition:.13s
  }
  .ibtn:hover{background:var(--paper-2);color:var(--ink)}
  .ibtn svg{width:16px;height:16px}
  .ibtn.accent:hover{color:var(--accent)}

  /* ===================== Project tree ===================== */
  .proj-empty{color:var(--ink-soft);font-style:italic;padding:18px 6px;text-align:center;font-size:14px}
  .node{margin:1px 0}
  .node-row{
    display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:var(--r-sm);
    border:1px solid transparent;position:relative
  }
  .node-row:hover{background:#fffdf7;border-color:var(--line)}
  .node-row.dragover-into{background:#f0e9d8;border-color:var(--accent-soft)}
  .node-row.drop-before::before,
  .node-row.drop-after::after{
    content:"";position:absolute;left:8px;right:8px;height:2px;background:var(--accent);border-radius:2px
  }
  .node-row.drop-before::before{top:-1px}
  .node-row.drop-after::after{bottom:-1px}

  .drag-handle{cursor:grab;color:var(--line-strong);display:grid;place-items:center;width:16px;flex:none}
  .drag-handle:hover{color:var(--ink-soft)}
  .twirl{
    width:20px;height:20px;flex:none;border:none;background:transparent;color:var(--ink-soft);
    display:grid;place-items:center;border-radius:5px
  }
  .twirl:hover{background:var(--paper-2)}
  .twirl svg{width:13px;height:13px;transition:transform .15s}
  .node.collapsed > .node-row .twirl svg{transform:rotate(-90deg)}
  .twirl.leaf{visibility:hidden}

  .node-label{
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    padding:2px 4px;border-radius:5px;font-size:15px
  }
  .node-label:focus{outline:2px solid var(--accent-soft);background:#fff}
  .node-actions{display:flex;align-items:center;gap:1px;opacity:0;transition:.12s;flex:none}
  .node-row:hover .node-actions,.node-row:focus-within .node-actions{opacity:1}

  /* calendar checkbox + per-branch colour dot + date/time badge */
  .node-check{width:14px;height:14px;flex:none;margin:0;accent-color:var(--accent);cursor:pointer}
  .node-dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(11,27,58,.08)}
  .node-when{
    font-size:11px;font-weight:600;color:var(--ink-soft);white-space:nowrap;flex:none;
    padding:1px 6px;border-radius:6px;background:var(--paper)
  }
  .node-when.conflict,.node-when .conflict{color:var(--abandon)}
  .node-when .when-sep{color:var(--line-strong);font-weight:600}

  /* depth styling: H1 walnut/bold, deeper = lighter + smaller */
  .node[data-depth="0"] > .node-row > .node-label{font-weight:600;color:var(--accent);font-size:16px}
  .node[data-depth="1"] > .node-row > .node-label{font-weight:600;color:var(--ink)}
  .node[data-depth="2"] > .node-row > .node-label{color:var(--ink);font-size:14px}
  .node[data-depth="3"] > .node-row > .node-label{color:var(--ink-soft);font-size:14px}
  .children{margin-left:18px;border-left:1px solid var(--line);padding-left:6px}
  .node.collapsed > .children{display:none}

  /* task state chips on a node */
  .state-chip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;letter-spacing:.3px;flex:none}
  .state-chip.completed{background:#e3efe5;color:var(--done)}
  .state-chip.postponed{background:#f6edd2;color:#9a7715}
  .state-chip.abandoned{background:#f3ddd8;color:var(--abandon)}
  .node-row.completed .node-label{text-decoration:line-through;text-decoration-color:var(--done);color:var(--ink-soft)}
  .node-row.abandoned .node-label{text-decoration:line-through;text-decoration-color:var(--abandon);color:var(--ink-soft)}

  /* ===================== To-do panel ===================== */
  .todo-date{font-size:13px;color:var(--ink-soft);font-weight:500}
  .todo-date b{color:var(--ink);font-weight:600}
  .viewing-banner{
    margin:0 0 10px;padding:8px 12px;border-radius:var(--r-sm);font-size:12.5px;
    background:#eef3ff;border:1px solid #d4e0ff;color:var(--accent);
    display:flex;align-items:center;gap:8px;font-weight:600
  }
  .viewing-banner svg{width:16px;height:16px;flex:none}
  .viewing-banner button{margin-left:auto}
  .todo-add{display:flex;gap:8px;margin-bottom:12px}
  .todo-add input{
    flex:1;padding:9px 12px;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink)
  }
  .todo-add input:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  .todo-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
  .todo-item{
    display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:var(--r-sm);
    border:1px solid transparent
  }
  .todo-item:hover{background:#f6f9ff;border-color:var(--line)}
  .todo-item.dragging{opacity:.4}
  .todo-item.drop-before{box-shadow:0 -2px 0 var(--accent)}
  .todo-item.drop-after{box-shadow:0 2px 0 var(--accent)}
  .todo-grip{cursor:grab;color:var(--line-strong);display:grid;place-items:center;width:16px;flex:none}
  .todo-grip:hover{color:var(--ink-soft)}
  .todo-grip svg{width:15px;height:15px}
  .todo-text{flex:1;font-size:14.5px;cursor:text;padding:2px 3px;border-radius:5px}
  .todo-text:focus{outline:2px solid var(--accent-soft);background:#fff}
  .todo-item.completed .todo-text{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--done);color:var(--ink-soft)}
  .todo-item.postponed .todo-text{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--postpone);color:var(--ink-soft)}
  .todo-item.abandoned .todo-text{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--abandon);color:var(--ink-soft)}
  .todo-item .carried{font-size:10px;color:#b97b09;border:1px solid #f3dca6;background:#fef6e3;padding:1px 7px;border-radius:20px;font-weight:600;flex:none}
  .todo-states{display:flex;gap:2px;opacity:0;transition:.12s}
  .todo-item:hover .todo-states,.todo-item:focus-within .todo-states{opacity:1}
  .sbtn{width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:transparent;display:grid;place-items:center}
  .sbtn svg{width:15px;height:15px}
  .sbtn.done{color:var(--done)}      .sbtn.done:hover{background:#e3efe5}
  .sbtn.post{color:var(--postpone)}  .sbtn.post:hover{background:#f6edd2}
  .sbtn.aband{color:var(--abandon)}  .sbtn.aband:hover{background:#f3ddd8}
  .sbtn.del{color:var(--ink-soft)}   .sbtn.del:hover{background:var(--paper-2)}
  .sbtn.active.done{background:var(--done);color:#fff;border-color:var(--done)}
  .sbtn.active.post{background:var(--postpone);color:#fff;border-color:var(--postpone)}
  .sbtn.active.aband{background:var(--abandon);color:#fff;border-color:var(--abandon)}
  .todo-empty{color:var(--ink-soft);font-style:italic;text-align:center;padding:16px;font-size:14px}

  /* legend */
  .legend{display:flex;gap:14px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:16px;height:3px;border-radius:2px;display:inline-block}

  /* ===================== Calendar ===================== */
  .cal-head{display:flex;align-items:center;gap:8px}
  .cal-nav{display:flex;align-items:center;gap:2px}
  .cal-title{font-weight:600;font-size:15px;min-width:130px;text-align:center}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--r-sm);overflow:hidden}
  .seg button{border:none;background:transparent;padding:5px 11px;font-size:12.5px;color:var(--ink-soft)}
  .seg button.active{background:var(--teal);color:#fff}
  #calPanel .panel-body{display:flex;flex-direction:column}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:auto repeat(6,1fr);gap:4px;flex:1;min-height:0}
  .cal-dow{text-align:center;font-size:10.5px;color:var(--ink-soft);font-weight:700;padding:3px 0;letter-spacing:.6px}
  .cal-cell{
    min-height:46px;border:1px solid var(--line);border-radius:9px;background:#fff;
    display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;
    padding:5px 7px;font-size:13px;font-weight:600;position:relative;transition:.12s;color:var(--ink)
  }
  .cal-cell:hover{border-color:var(--accent-soft);background:#f5f8ff}
  .cal-cell.muted{color:var(--line-strong);background:#fafbfe;font-weight:500}
  .cal-cell.today{border-color:var(--accent);background:#eef3ff;box-shadow:0 0 0 1px var(--accent) inset}
  .cal-cell.selected{background:#fdebef;border-color:var(--brand);box-shadow:0 0 0 1px var(--brand) inset}
  .cal-cell.today.selected{box-shadow:0 0 0 1px var(--brand) inset}
  .cal-cell .pip{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--brand-deep)}
  /* coloured project-task dots (replace the old to-do pip) */
  .cal-cell .tdots{
    position:absolute;bottom:4px;left:0;right:0;display:flex;gap:3px;
    justify-content:center;align-items:center;flex-wrap:wrap;padding:0 4px;pointer-events:none
  }
  .cal-cell .tdot{width:6px;height:6px;border-radius:50%;box-shadow:0 0 0 1px rgba(11,27,58,.06)}
  .cal-cell .tmore{font-size:8.5px;font-weight:800;color:var(--ink-soft);line-height:1}

  /* full-year view: 12 mini month grids showing every day */
  .year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;min-height:0;align-content:start}
  .mini-month{border:1px solid var(--line);border-radius:11px;background:#fff;padding:10px 10px 12px;transition:.12s}
  .mini-month:hover{border-color:var(--accent-soft);box-shadow:0 4px 14px rgba(23,70,224,.08)}
  .mini-title{font-size:12.5px;font-weight:700;margin:0 2px 7px;color:var(--ink);display:flex;align-items:center;gap:6px}
  .mini-title.cur{color:var(--accent)}
  .mini-dow-row,.mini-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .mini-dow{font-size:8.5px;font-weight:700;color:var(--ink-soft);text-align:center;padding-bottom:3px}
  .mini-day{
    font-size:10px;font-weight:600;aspect-ratio:1;display:grid;place-items:center;border-radius:5px;
    color:var(--ink);position:relative;cursor:pointer;transition:.1s
  }
  .mini-day:hover{background:var(--paper-2)}
  .mini-day.muted{color:var(--line-strong);font-weight:500}
  .mini-day.today{background:var(--accent);color:#fff}
  .mini-day.selected{outline:1.5px solid var(--brand);outline-offset:-1px}
  .mini-day .mpip{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--brand-deep)}
  .mini-day.today .mpip{background:#fff}
  .mini-day .mtdots{position:absolute;bottom:0;left:0;right:0;display:flex;gap:1.5px;justify-content:center;align-items:center;pointer-events:none}
  .mini-day .mtdot{width:3.5px;height:3.5px;border-radius:50%}

  /* ===================== Modal ===================== */
  .scrim{position:fixed;inset:0;background:rgba(40,32,20,.42);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .scrim.open{display:flex}
  .modal{
    width:540px;max-width:100%;max-height:90vh;overflow:auto;background:var(--card);
    border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line-strong);
    animation:pop .16s ease
  }
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:17px}
  .modal-head .modal-title-input{
    flex:1;min-width:0;font:inherit;font-size:17px;font-weight:700;color:var(--ink);
    border:1px solid transparent;background:transparent;border-radius:7px;padding:5px 9px;margin:-3px 0;transition:.13s
  }
  .modal-head .modal-title-input:hover{border-color:var(--line);background:#fff}
  .modal-head .modal-title-input:focus{outline:none;border-color:var(--accent-soft);background:#fff;box-shadow:0 0 0 3px rgba(23,70,224,.14)}
  .modal-head .modal-title-input::placeholder{color:var(--ink-soft);font-weight:600}
  .modal-head .spacer{flex:1}
  .modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
  /* two-panel task modal: existing fields left, per-task to-do right */
  #taskScrim .modal{width:760px}
  .modal-cols{display:flex;gap:18px;align-items:stretch;width:100%}
  .modal-col{display:flex;flex-direction:column;gap:14px;min-width:0}
  .modal-col.left{flex:1.25}
  .modal-col.right{flex:1;border-left:1px solid var(--line);padding-left:18px}
  .checklist-field{flex:1;display:flex;flex-direction:column;min-height:0}
  .checklist{display:flex;flex-direction:column;gap:4px;overflow:auto;max-height:300px;flex:1;margin-bottom:4px}
  .check-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--r-sm);border:1px solid transparent}
  .check-item:hover{background:#f6f9ff;border-color:var(--line)}
  .check-item input[type=checkbox]{width:15px;height:15px;flex:none;accent-color:var(--accent);cursor:pointer;margin:0}
  .check-item .ci-text{flex:1;min-width:0;font-size:14px;padding:2px 3px;border-radius:5px;word-break:break-word}
  .check-item .ci-text:focus{outline:2px solid var(--accent-soft);background:#fff}
  .check-item.done .ci-text{text-decoration:line-through;text-decoration-color:var(--done);color:var(--ink-soft)}
  .check-rem{width:24px;height:24px;flex:none;border:1px solid transparent;background:transparent;color:var(--ink-soft);display:grid;place-items:center;border-radius:6px;opacity:0;transition:.12s}
  .check-item:hover .check-rem,.check-item:focus-within .check-rem{opacity:1}
  .check-rem:hover{background:#f3ddd8;color:var(--abandon)}
  .check-rem svg{width:14px;height:14px}
  .checklist-empty{color:var(--ink-soft);font-style:italic;font-size:13px;padding:10px 4px;text-align:center}
  .checklist-add{display:flex;gap:8px;flex:none}
  .checklist-add input{flex:1;min-width:0;padding:8px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-family:inherit;font-size:14px;background:#fff;color:var(--ink)}
  .checklist-add input:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  @media (max-width:700px){
    #taskScrim .modal{width:540px}
    .modal-cols{flex-direction:column}
    .modal-col.right{border-left:none;border-top:1px solid var(--line);padding-left:0;padding-top:14px}
    .checklist{max-height:200px}
  }
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
  .field input[type=text],.field textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink);resize:vertical
  }
  .field input:focus,.field textarea:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  .field input[type=date],.field input[type=time]{
    width:auto;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink)
  }
  .field .time-toggle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);text-transform:none;letter-spacing:0;cursor:pointer}
  .field .time-toggle input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
  .dt-row{display:flex;align-items:center;gap:10px}
  .color-hint{font-size:12.5px;color:var(--ink-soft)}
  .date-row{display:flex;gap:12px;align-items:flex-end}
  .dc-col{display:flex;flex-direction:column;flex:1;min-width:0}
  .dc-col label{margin-bottom:5px}
  .dc-col input[type=date]{width:100%}
  .dc-color{display:flex;flex-direction:column}
  .dc-color label{margin-bottom:5px}
  .circle-wrap{display:flex;align-items:center;gap:6px;height:38px}
  .color-circle{
    width:30px;height:30px;border-radius:50%;border:2px solid #fff;padding:0;cursor:pointer;
    box-shadow:0 0 0 1px var(--line-strong),0 1px 3px rgba(11,27,58,.2);transition:.13s
  }
  .color-circle:hover{box-shadow:0 0 0 2px var(--accent-soft),0 1px 3px rgba(11,27,58,.2)}
  .color-reset{
    width:26px;height:26px;border-radius:7px;border:1px solid transparent;background:transparent;
    color:var(--ink-soft);display:grid;place-items:center
  }
  .color-reset:hover{background:var(--paper-2);color:var(--ink)}
  .color-reset svg{width:15px;height:15px}
  .state-row{display:flex;gap:8px;flex-wrap:wrap}
  .state-pick{
    flex:1;min-width:120px;border:1px solid var(--line-strong);background:#fff;border-radius:var(--r-sm);
    padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--ink-soft)
  }
  .state-pick svg{width:16px;height:16px}
  .state-pick.sel.completed{background:var(--done);color:#fff;border-color:var(--done)}
  .state-pick.sel.postponed{background:var(--postpone);color:#fff;border-color:var(--postpone)}
  .state-pick.sel.abandoned{background:var(--abandon);color:#fff;border-color:var(--abandon)}
  .conditional{display:none}
  .conditional.show{display:block}
  .modal-foot{display:flex;align-items:center;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
  .modal-foot .spacer{flex:1}
  .btn.danger{color:var(--abandon);border-color:#e0bcb4}
  .btn.danger:hover{background:#f3ddd8}

  .confirm .modal{width:400px}
  .confirm p{margin:0;font-size:14.5px;line-height:1.5}
  .confirm .warn{color:var(--abandon);font-weight:600}

  /* history list */
  .hist-day{margin-bottom:16px}
  .hist-day h4{margin:0 0 7px;font-size:13px;color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:4px}
  .hist-item{display:flex;align-items:center;gap:9px;padding:4px 2px;font-size:14px}
  .hist-item .tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;flex:none}
  .hist-item.completed .txt{text-decoration:line-through;text-decoration-color:var(--done);color:var(--ink-soft)}
  .hist-item.postponed .txt{text-decoration:line-through;text-decoration-color:var(--postpone);color:var(--ink-soft)}
  .hist-item.abandoned .txt{text-decoration:line-through;text-decoration-color:var(--abandon);color:var(--ink-soft)}
  .tag.completed{background:#e3efe5;color:var(--done)}
  .tag.postponed{background:#f6edd2;color:#9a7715}
  .tag.abandoned{background:#f3ddd8;color:var(--abandon)}
  .tag.open{background:var(--paper-2);color:var(--ink-soft)}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:80;pointer-events:none
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:880px){
    .layout{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto}
    #projectPanel,#todoPanel,#calPanel{grid-column:1;grid-row:auto;min-height:340px}
  }
  /* ===================== Auth gate + Supabase additions ===================== */
  .user-email{font-size:12px;color:#cdd9f0;font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ro-pill{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11.5px;font-weight:700;letter-spacing:.02em;
    color:var(--brand-deep);background:#fdecef;border:1px solid #f3c7cf;
    padding:4px 10px;border-radius:999px;white-space:nowrap;
  }
  .ro-pill svg{width:13px;height:13px}

  .auth-gate{
    position:fixed;inset:0;z-index:9999;
    display:grid;place-items:center;padding:24px;
    background:
      radial-gradient(900px 600px at 85% -10%, #16306a 0%, transparent 55%),
      radial-gradient(700px 600px at 0% 110%, #5a0f1c 0%, transparent 55%),
      linear-gradient(160deg,var(--navy) 0%,#0a1530 100%);
  }
  .auth-card{
    width:100%;max-width:380px;background:var(--card);
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 26px 70px rgba(5,12,30,.5);
    padding:30px 28px 24px;
  }
  .auth-brand{display:flex;align-items:center;gap:13px;margin-bottom:22px}
  .auth-mark{
    width:46px;height:46px;border-radius:12px;flex:none;
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;letter-spacing:.5px;
    background:linear-gradient(150deg,var(--brand) 0%,var(--brand-deep) 100%);
    box-shadow:0 6px 18px rgba(122,20,36,.4);
  }
  .auth-title{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
  .auth-sub{font-size:10.5px;font-weight:700;letter-spacing:1.4px;color:var(--ink-soft);margin-top:3px}
  .auth-label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px}
  .auth-input{
    width:100%;font:inherit;font-size:14px;color:var(--ink);
    padding:11px 13px;border:1px solid var(--line-strong);border-radius:10px;
    background:#fbfcfe;outline:none;transition:border-color .15s,box-shadow .15s;
  }
  .auth-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(155,28,46,.14)}
  .auth-err{
    margin-top:14px;font-size:13px;color:var(--brand-deep);
    background:#fdecef;border:1px solid #f3c7cf;border-radius:9px;padding:9px 12px;
  }
  .auth-btn{
    width:100%;margin-top:18px;font:inherit;font-size:14.5px;font-weight:700;color:#fff;
    padding:12px 14px;border:none;border-radius:11px;cursor:pointer;
    background:linear-gradient(150deg,var(--brand) 0%,var(--brand-deep) 100%);
    box-shadow:0 8px 20px rgba(122,20,36,.32);transition:filter .15s,transform .05s;
  }
  .auth-btn:hover{filter:brightness(1.06)}
  .auth-btn:active{transform:translateY(1px)}
  .auth-btn:disabled{opacity:.65;cursor:default}
  .auth-foot{margin-top:18px;font-size:11.5px;line-height:1.5;color:var(--ink-soft);text-align:center}

  /* ===================== Top-right panel tabs ===================== */
  .todo-tabs{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--r-sm);overflow:hidden;margin-right:4px}
  .todo-tabs button{border:none;background:transparent;padding:6px 12px;font-size:12.5px;font-weight:700;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px}
  .todo-tabs button svg{width:14px;height:14px}
  .todo-tabs button.active{background:var(--accent);color:#fff}
  .todo-tabs .pill{font-size:10px;font-weight:800;background:rgba(255,255,255,.25);border-radius:20px;padding:0 6px;min-width:16px;text-align:center}
  .todo-tabs button:not(.active) .pill{background:var(--paper-2);color:var(--ink-soft)}

  /* ===================== Assignee chips & picker (checklist items) ===================== */
  .assignees{display:inline-flex;align-items:center;gap:3px;flex-wrap:wrap}
  .ini-chip{
    font-size:10px;font-weight:800;letter-spacing:.02em;color:#fff;background:var(--accent);
    border-radius:20px;padding:2px 7px;line-height:1.4;white-space:nowrap;flex:none
  }
  .ini-chip.muted{background:var(--ink-soft)}
  .ini-chip.mine{background:var(--brand)}
  .assign-btn{
    width:24px;height:24px;flex:none;border:1px dashed var(--line-strong);background:#fff;color:var(--ink-soft);
    display:grid;place-items:center;border-radius:20px;font-size:13px;font-weight:800
  }
  .assign-btn:hover{border-color:var(--accent-soft);color:var(--accent)}
  .assign-btn svg{width:13px;height:13px}
  .check-item{flex-wrap:wrap}
  .assign-editor{flex-basis:100%;width:100%;margin:6px 0 2px;padding:8px;border:1px solid var(--line);border-radius:9px;background:#fbfcfe}
  .assign-editor .ae-empty{font-size:12.5px;color:var(--ink-soft);font-style:italic}
  .assign-opt{display:flex;align-items:center;gap:8px;padding:4px 5px;border-radius:6px;font-size:13.5px}
  .assign-opt:hover{background:#fff}
  .assign-opt input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;margin:0;flex:none}
  .assign-opt .ao-ini{font-size:10px;font-weight:800;color:#fff;background:var(--ink-soft);border-radius:20px;padding:2px 7px;flex:none}
  .assign-opt .ao-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ===================== "Assigned to me" list ===================== */
  .assigned-proj{margin-bottom:14px}
  .assigned-proj h4{
    margin:0 0 6px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);
    border-bottom:1px solid var(--line);padding-bottom:4px;display:flex;align-items:center;gap:7px
  }
  .assigned-item{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:var(--r-sm);border:1px solid transparent}
  .assigned-item:hover{background:#f6f9ff;border-color:var(--line)}
  .assigned-item.done .ai-text{text-decoration:line-through;text-decoration-color:var(--done);color:var(--ink-soft)}
  .assigned-item input.ai-check{width:16px;height:16px;flex:none;margin-top:2px;accent-color:var(--accent);cursor:pointer}
  .assigned-item .ai-main{flex:1;min-width:0}
  .assigned-item .ai-text{font-size:14.5px;word-break:break-word}
  .assigned-item .ai-path{font-size:11px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .assigned-item .ai-who{display:inline-flex;gap:3px;margin-top:4px;flex-wrap:wrap}
  .assigned-item .ai-pull{
    flex:none;border:1px solid var(--line-strong);background:#fff;color:var(--accent);font-weight:700;font-size:12px;
    border-radius:var(--r-sm);padding:5px 9px;display:inline-flex;align-items:center;gap:5px;align-self:center
  }
  .assigned-item .ai-pull:hover{border-color:var(--accent-soft);box-shadow:0 2px 8px rgba(23,70,224,.12)}
  .assigned-item .ai-pull.added{color:var(--done);border-color:#bfe6d6;background:#f0faf6}
  .assigned-item .ai-pull svg{width:14px;height:14px}
  .assigned-item .ai-snooze-wrap{flex:none;align-self:center;position:relative;display:inline-flex}
  .assigned-item .ai-snooze{
    border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);font-weight:700;font-size:12px;
    border-radius:var(--r-sm);padding:5px 9px;display:inline-flex;align-items:center;gap:5px;cursor:pointer
  }
  .assigned-item .ai-snooze:hover{border-color:var(--postpone);color:#b97b09;box-shadow:0 2px 8px rgba(245,165,36,.16)}
  .assigned-item .ai-snooze svg{width:14px;height:14px}
  .assigned-item .ai-snooze-date{position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none}
  .assigned-empty{color:var(--ink-soft);font-style:italic;text-align:center;padding:22px 10px;font-size:14px;line-height:1.5}

  /* linked (pulled-in) personal to-do marker */
  .todo-item .linked{font-size:10px;color:var(--accent);border:1px solid #cfdcff;background:#eef3ff;padding:1px 7px;border-radius:20px;font-weight:700;flex:none;display:inline-flex;align-items:center;gap:4px}
  .todo-item .linked svg{width:11px;height:11px}

  /* ===================== Members (people) & project-members modals ===================== */
  .mem-row{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:7px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .mem-row .mr-email{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--ink-soft)}
  .mem-row .mr-mgr{font-size:10px;font-weight:800;color:var(--brand-deep);background:#fdecef;border:1px solid #f3c7cf;border-radius:20px;padding:1px 8px;flex:none}
  .mem-row input.mr-name{width:150px;flex:none;padding:7px 9px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-family:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
  .mem-row input.mr-ini{width:74px;flex:none;text-align:center;text-transform:uppercase;font-weight:800;letter-spacing:.04em;padding:7px 6px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-family:inherit;font-size:13.5px;background:#fff;color:var(--ink)}
  .mem-row input.mr-ini.dupe{border-color:var(--abandon);background:#fdebef}
  .mem-hint{font-size:12.5px;color:var(--ink-soft);margin:2px 0 12px;line-height:1.5}

  .picker-filter{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-family:inherit;font-size:14px;background:#fff;color:var(--ink);margin-bottom:8px}
  .picker-filter:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  .picker-list{display:flex;flex-direction:column;gap:2px;max-height:46vh;overflow:auto;border:1px solid var(--line);border-radius:9px;padding:6px}
  .picker-opt{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:7px;cursor:pointer}
  .picker-opt:hover{background:#f6f9ff}
  .picker-opt input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none;margin:0}
  .picker-opt .po-ini{font-size:10px;font-weight:800;color:#fff;background:var(--accent);border-radius:20px;padding:2px 8px;flex:none}
  .picker-opt .po-name{font-weight:600;font-size:14px}
  .picker-opt .po-email{font-size:12px;color:var(--ink-soft)}
  .picker-opt .po-col{min-width:0;display:flex;flex-direction:column;line-height:1.25;overflow:hidden}
  .picker-opt .po-col *{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .picker-empty{font-size:13.5px;color:var(--ink-soft);font-style:italic;padding:12px;text-align:center}
  .proj-row .pr-members{flex:none;font-size:12px;color:var(--ink-soft)}

  /* ===================== Guide / Start-here page ===================== */
  .guide{max-width:720px;margin:0 auto;padding:6px 6px 24px}
  .guide-bar{display:flex;align-items:center;margin-bottom:14px}
  .guide-bar .spacer{flex:1}
  .guide h1.g-h1{font-size:22px;margin:18px 0 8px;color:var(--ink)}
  .guide h2.g-h2{font-size:17px;margin:18px 0 6px;color:var(--accent)}
  .guide p.g-p{font-size:14.5px;line-height:1.6;margin:0 0 10px;color:var(--ink)}
  .guide li.g-li{font-size:14.5px;line-height:1.55;margin:0 0 5px 4px;color:var(--ink);list-style:none;display:flex;gap:8px}
  .guide li.g-li::before{content:"›";color:var(--accent);font-weight:800;flex:none}
  .guide .g-edit textarea{
    width:100%;min-height:50vh;padding:13px 15px;border:1px solid var(--line-strong);border-radius:11px;
    font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;font-size:13.5px;line-height:1.55;
    background:#fbfcfe;color:var(--ink);resize:vertical
  }
  .guide .g-edit textarea:focus{outline:2px solid var(--accent-soft);outline-offset:-1px}
  .guide .g-edit-foot{display:flex;gap:8px;align-items:center;margin-top:10px}
  .guide .g-edit-hint{font-size:12px;color:var(--ink-soft);flex:1}

  /* abandoned checklist item (red cross-out) — in the task modal */
  .check-item.abandoned .ci-text{text-decoration:line-through;text-decoration-color:var(--abandon);text-decoration-thickness:2px;color:var(--abandon)}
  /* abandoned item in the "Assigned to me" list */
  .assigned-item.abandoned .ai-text{text-decoration:line-through;text-decoration-color:var(--abandon);text-decoration-thickness:2px;color:var(--abandon)}

  /* read-only notepad balloon launched from a tree row */
  .note-balloon{
    position:fixed;z-index:90;width:300px;max-width:86vw;max-height:60vh;overflow:auto;
    background:var(--card);border:1px solid var(--line-strong);border-radius:12px;
    box-shadow:var(--shadow);padding:13px 15px;animation:pop .14s ease
  }
  .note-balloon .nb-title{font-weight:700;font-size:14.5px;margin-bottom:8px;color:var(--ink)}
  .note-balloon .nb-sec{margin-top:11px}
  .note-balloon .nb-sec:first-of-type{margin-top:0}
  .note-balloon .nb-h{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .note-balloon .nb-body{font-size:13.5px;line-height:1.5;color:var(--ink);word-break:break-word}
  .note-balloon .nb-empty{color:var(--ink-soft);font-style:italic}
  /* ===================== Project tabs (browser-style) ===================== */
  .projtabs{display:flex;align-items:flex-end;gap:6px;padding:8px 14px 0;background:#fff;border-bottom:1px solid var(--line-strong);flex:none}
  .pt-arrow{width:30px;height:34px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink-soft);border-radius:var(--r-sm);display:none;place-items:center;flex:none;margin-bottom:1px}
  .pt-arrow.show{display:grid}
  .pt-arrow:hover{color:var(--ink);border-color:var(--accent-soft)}
  .pt-arrow svg{width:16px;height:16px}
  .pt-scroll{flex:1;display:flex;gap:6px;overflow-x:hidden;scroll-behavior:smooth;min-width:0}
  .pt-tab{
    flex:0 0 auto;min-width:96px;max-width:230px;
    display:flex;align-items:center;gap:8px;
    padding:9px 14px;border:1px solid var(--line-strong);border-bottom:none;
    border-radius:10px 10px 0 0;background:var(--paper);color:var(--ink-soft);
    font-size:13.5px;font-weight:700;cursor:pointer;position:relative;transition:.13s;white-space:nowrap
  }
  .pt-tab .pt-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pt-tab .pt-dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--accent-soft)}
  .pt-tab:hover{background:#fff;color:var(--ink)}

/* ---------- date helpers ---------- */
const pad = n => String(n).padStart(2,'0');

function ensureProjects(){
  // migrate the legacy single-tree format (projectTree / calendarSelection at top level)
  if((!Array.isArray(state.projects) || state.projects.length===0) &&
     Array.isArray(state.projectTree) && state.projectTree.length){
    state.projects=[{
      id: uid(), name:'Project 1',
      tree: state.projectTree,
      calendarSelection:(state.calendarSelection && typeof state.calendarSelection==='object') ? state.calendarSelection : {}

  delete state.projectTree; delete state.calendarSelection;   // drop legacy keys

  if(!state.projects.length && !sb){
    state.projects.push({id:uid(), name:'Project 1', tree:[], calendarSelection:{}});
  }
  state.projects.forEach(p=>{
    if(!p.id) p.id=uid();
    if(typeof p.name!=='string' || !p.name.trim()) p.name='Untitled project';
    if(!Array.isArray(p.tree)) p.tree=[];
    if(!p.calendarSelection || typeof p.calendarSelection!=='object') p.calendarSelection={};
    if(!Array.isArray(p.meetings)) p.meetings=[];
    p.archived = !!p.archived;

  const actives = state.projects.filter(p=>!p.archived);

    state.activeProjectId = GUIDE_ID;

  // the active project must exist AND be non-archived

}

/* Show/hide role-dependent controls after we know the signed-in user's role. */

/* ============================================================
   SUPABASE DATA LAYER  (replaces the old local file / localStorage layer)
   ============================================================ */

/* remove transient underscore-prefixed keys (e.g. _color, _autoHex) before saving */
function strip(obj){
  return JSON.parse(JSON.stringify(obj, (k,v)=> k.startsWith('_')? undefined : v));
}

/* a projects-table row → the in-memory project shape the UI expects */
function rowToProject(r){
  const d = (r.data && typeof r.data==='object') ? r.data : {};
  return {
    id: r.id,
    name: r.name || 'Untitled project',
    archived: !!r.archived,
    tree: Array.isArray(d.tree) ? d.tree : [],
    calendarSelection: (d.calendarSelection && typeof d.calendarSelection==='object') ? d.calendarSelection : {},
    meetings: Array.isArray(d.meetings) ? d.meetings : []
  };
}

/* ---------- save (debounced) ----------
   Every edit in the app already calls scheduleSave(); here that becomes a
   debounced push to Supabase: the user's to-do row + (if changed) the active
   project's CONTENTS. Manager-only actions (rename / archive / restore) save the
   project's name/archived separately. */
function scheduleSave(){
  clearTimeout(saveTimer);
  setSyncStatus('Saving…');
  saveTimer = setTimeout(pushNow, 1200);
}
async function pushNow(){
  if(!sb || !currentUser) return;
  await supaSaveTodos();
  if(canEditProjects()){
    const p = activeProject();
    if(p && dbProjectIds.has(p.id)) await supaSaveProjectData(p);
  }
  flashSaved();
}

/* Remember the last contents we saved per project, so a to-do-only edit (or a
   project switch) doesn't needlessly re-write the tree and clobber a teammate's
   concurrent edit. Each project's tree is one document, so true simultaneous
   edits to the SAME project are still last-write-wins. */
let lastProjData = {};
function projDataJSON(p){ return JSON.stringify(strip({ tree:p.tree, calendarSelection:p.calendarSelection, meetings:p.meetings || [] })); }
function rememberProjData(p){ if(p) lastProjData[p.id] = projDataJSON(p); }

/* Save a project's CONTENTS (the `data` column only). Allowed for anyone who
   may edit projects — this never touches name/archived, so it can't rename or
   archive, and won't trip the database guard. */
async function supaSaveProjectData(p){
  if(!sb || !p || !dbProjectIds.has(p.id)) return;
  if(!canEditProjectId(p.id)) return;
  const json = projDataJSON(p);
  if(lastProjData[p.id] === json) return;            // nothing actually changed
  const { error } = await sb.from('projects').update({ data: JSON.parse(json) }).eq('id', p.id);
  if(error){ toast('Project save failed: '+error.message); setSyncStatus('Save error'); }
  else lastProjData[p.id] = json;
}

/* Save a project's NAME / ARCHIVED flag — manager-only (create/archive/rename).
   The database enforces this too, via the projects_meta_guard trigger. */
async function supaSaveProjectMeta(p){
  if(!sb || !p || !dbProjectIds.has(p.id)) return;
  if(!canManageProjects()) return;
  const { error } = await sb.from('projects')
    .update({ name: p.name, archived: !!p.archived })
    .eq('id', p.id);
  if(error){ toast('Project update failed: '+error.message); setSyncStatus('Save error'); }
}

/* Save THIS user's to-do row. Keeps the _rolled/_origin markers so postponed
   items aren't rolled forward again after a reload on another device. */
async function supaSaveTodos(){
  if(!sb || !currentUser) return;
  lastTodosJSON = JSON.stringify(state.todos);     // remember our own write (realtime echo guard)
  const { error } = await sb.from('user_todos')
    .upsert({ user_id: currentUser.id, data: state.todos }, { onConflict:'user_id' });
  if(error){ toast('To-do save failed: '+error.message); setSyncStatus('Save error'); }
}

/* Insert a new project row; returns the in-memory project (with its DB UUID). */
async function supaInsertProject(name){
  if(!sb) return null;
  const { data, error } = await sb.from('projects')
    .insert({ name: (name||'').trim() || 'Untitled project' })
    .select('id,name,archived,data').single();
  if(error){ toast('Could not add project: '+error.message); return null; }
  const p = rowToProject(data);
  state.projects.push(p);
  dbProjectIds.add(p.id);
  rememberProjData(p);
  state.activeProjectId = p.id;
  return p;
}

/* ============================================================
   PEOPLE DIRECTORY, PROJECT MEMBERSHIP & GUIDE (data layer)
   ============================================================ */

/* A project's contents may be edited by its members (everyone who can SEE it is a
   member, because the database only hands a project to its members or a manager).
   The guide page is never editable as a tree. */
function canEditProjectId(pid){
  if(pid===GUIDE_ID) return false;
  if(canManageProjects()) return true;
  return dbProjectIds.has(pid);   // visible ⇒ I'm a member ⇒ I may edit its contents
}

/* Save one project's contents by id (used by the "Assigned to me" tab, which can touch
   a project other than the one open on the left). */
async function saveProjectById(pid){
  const p = state.projects.find(x=>x.id===pid);
  if(p){ await supaSaveProjectData(p); rememberProjData(p); flashSaved(); }
}

/* Locate a checklist item anywhere in a project tree. */
function findCheckItem(projectId, nodeId, checkId){
  const p = state.projects.find(x=>x.id===projectId);
  if(!p) return null;
  let found=null;
  (function walk(list){
    for(const n of (list||[])){
      if(found) return;
      if(n.id===nodeId && Array.isArray(n.checklist)){
        const c=n.checklist.find(x=>x.id===checkId);
        if(c){ found={project:p, node:n, item:c}; return; }
      }
      walk(n.children);
    }
  })(p.tree);
  return found;
}

/* Load the company people directory + per-project membership. */
async function loadPeople(){
  memberMap = {}; allProfiles = []; projectMembers = {};
  try{
    const { data, error } = await sb.from('profiles').select('id,email,full_name,initials,role');
    if(error) throw error;
    allProfiles = (data||[]).slice().sort((a,b)=>
      ((a.full_name||a.email||'')+'').toLowerCase().localeCompare(((b.full_name||b.email||'')+'').toLowerCase()));
    allProfiles.forEach(p=>{ memberMap[p.id]=p; });
  }catch(e){ /* directory is best-effort; initials fall back to the email */ }
  try{
    const { data, error } = await sb.from('project_members').select('project_id,user_id');
    if(error) throw error;
    (data||[]).forEach(r=>{ (projectMembers[r.project_id]||(projectMembers[r.project_id]=[])).push(r.user_id); });
  }catch(e){ /* membership is best-effort */ }
}

/* Manager: save a person's full name + initials. */
async function supaSetProfile(id, full_name, initials){
  if(!sb) return false;
  const { error } = await sb.from('profiles').update({ full_name:full_name, initials:initials }).eq('id', id);
  if(error){ toast('Could not save member: '+error.message); return false; }
  if(memberMap[id]){ memberMap[id].full_name=full_name; memberMap[id].initials=initials; }
  return true;
}

/* Manager: set exactly who belongs to a project (adds + removes the difference). */
async function supaSetProjectMembers(projectId, desiredIds){
  if(!sb) return;
  const current = projectMemberIds(projectId);
  const toAdd = desiredIds.filter(u=>current.indexOf(u)<0);
  const toRemove = current.filter(u=>desiredIds.indexOf(u)<0);
  try{
    if(toAdd.length){
      const { error } = await sb.from('project_members').insert(toAdd.map(u=>({project_id:projectId, user_id:u})));
      if(error) throw error;
    }
    for(const u of toRemove){
      const { error } = await sb.from('project_members').delete().eq('project_id',projectId).eq('user_id',u);
      if(error) throw error;
    }
    projectMembers[projectId] = desiredIds.slice();
  }catch(e){ toast('Could not update members: '+(e.message||e)); }
}

/* ============================================================
   GUIDE PAGE (rendered in the left panel)
   ============================================================ */
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* very small, safe formatter: "# " → H1, "## " → H2, "- " → bullet, blank line → new paragraph */
function guideToHtml(text){
  const lines=(text||'').split(/\r?\n/);
  let html=''; let para=[]; let inList=false;
  const flushPara=()=>{ if(para.length){ html+='<p class="g-p">'+para.join(' ')+'</p>'; para=[]; } };
  const flushList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  lines.forEach(raw=>{
    const line=raw.trim();
    if(line===''){ flushPara(); flushList(); return; }
    if(line.indexOf('## ')===0){ flushPara(); flushList(); html+='<h2 class="g-h2">'+escapeHtml(line.slice(3))+'</h2>'; return; }
    if(line.indexOf('# ')===0){ flushPara(); flushList(); html+='<h1 class="g-h1">'+escapeHtml(line.slice(2))+'</h1>'; return; }
    if(line.indexOf('- ')===0){ flushPara(); if(!inList){ html+='<ul style="margin:0 0 10px;padding:0">'; inList=true; } html+='<li class="g-li">'+escapeHtml(line.slice(2))+'</li>'; return; }
    para.push(escapeHtml(line));
  });
  flushPara(); flushList();
  return html || '<p class="g-p">No guide text yet.</p>';
}

function renderGuide(){
  const wrap=document.createElement('div'); wrap.className='guide';
  const bar=document.createElement('div'); bar.className='guide-bar';
  bar.innerHTML='<div class="spacer"></div>';
  if(canManageProjects() && !guideEditing){
    const eb=document.createElement('button'); eb.className='btn'; eb.innerHTML=svg('edit')+'Edit guide';
    eb.onclick=()=>{ guideEditing=true; renderTree(); };
    bar.appendChild(eb);
  }
  wrap.appendChild(bar);

  if(guideEditing){
    const ed=document.createElement('div'); ed.className='g-edit';
    const ta=document.createElement('textarea'); ta.value=guideText; ta.spellcheck=false;
    ed.appendChild(ta);
    const foot=document.createElement('div'); foot.className='g-edit-foot';
    const hint=document.createElement('div'); hint.className='g-edit-hint';
    hint.textContent='Tip: start a line with "# " for a big heading, "## " for a smaller one, and "- " for a bullet.';
    const cancel=document.createElement('button'); cancel.className='btn'; cancel.textContent='Cancel';
    cancel.onclick=()=>{ guideEditing=false; renderTree(); };
    const save=document.createElement('button'); save.className='btn primary'; save.innerHTML=svg('check')+'Save guide';
    save.onclick=async()=>{ await saveGuide(ta.value); guideEditing=false; renderTree(); };
    foot.appendChild(hint); foot.appendChild(cancel); foot.appendChild(save);
    ed.appendChild(foot);
    wrap.appendChild(ed);
  }else{
    const body=document.createElement('div');
    body.innerHTML=guideToHtml(guideText);
    wrap.appendChild(body);
  }
  projContainer.innerHTML='';
  projContainer.appendChild(wrap);
}

/* ============================================================
   PEOPLE MODAL (manager: set each person's name + initials)
   ============================================================ */
function genInitials(fullName, takenSet){
  const words=(fullName||'').trim().split(/\s+/).filter(Boolean);
  let base='';
  if(words.length>=2) base=words.slice(0,3).map(w=>w[0]).join('');
  else if(words.length===1) base=words[0].slice(0,3);
  base=base.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!base) return '';
  let out=base, n=2;
  while(takenSet && takenSet.has(out)){ out=base+n; n++; }   // "AKP" taken → "AKP2", "AKP3"…
  return out;
}
function openMembersModal(){
  if(!canManageProjects()){ toast('Only a manager can manage members.'); return; }
  renderMembersModal();
  document.getElementById('memScrim').classList.add('open');
}
function closeMembersModal(){ document.getElementById('memScrim').classList.remove('open'); }
function renderMembersModal(){
  const box=document.getElementById('memBody'); if(!box) return;
  box.innerHTML='';
  if(!allProfiles.length){
    box.innerHTML='<div class="pm-empty">No people found. Create logins in Supabase → Authentication → Users, then refresh.</div>';
    return;
  }
  // recompute duplicate flags live
  const refreshDupes=()=>{
    const counts={};
    box.querySelectorAll('input.mr-ini').forEach(i=>{ const v=i.value.trim().toUpperCase(); if(v) counts[v]=(counts[v]||0)+1; });
    box.querySelectorAll('input.mr-ini').forEach(i=>{ const v=i.value.trim().toUpperCase(); i.classList.toggle('dupe', !!v && counts[v]>1); });
  };
  allProfiles.forEach(p=>{
    const row=document.createElement('div'); row.className='mem-row';
    const nameI=document.createElement('input'); nameI.className='mr-name'; nameI.type='text';
    nameI.placeholder='Full name'; nameI.value=p.full_name||'';
    const iniI=document.createElement('input'); iniI.className='mr-ini'; iniI.type='text'; iniI.maxLength=4;
    iniI.placeholder='INI'; iniI.value=p.initials||'';
    let iniTouched = !!(p.initials);
    nameI.addEventListener('input',()=>{
      if(!iniTouched){
        const taken=new Set(allProfiles.filter(o=>o.id!==p.id).map(o=>(memberMap[o.id]&&memberMap[o.id].initials||'').toUpperCase()).filter(Boolean));
        iniI.value=genInitials(nameI.value, taken);
        refreshDupes();
      }
    });
    iniI.addEventListener('input',()=>{ iniTouched=true; iniI.value=iniI.value.toUpperCase(); refreshDupes(); });

    const email=document.createElement('div'); email.className='mr-email'; email.textContent=p.email||''; email.title=p.email||'';

    const save=document.createElement('button'); save.className='btn primary'; save.textContent='Save'; save.style.flex='none';
    save.onclick=async()=>{
      const nm=nameI.value.trim();
      const ini=(iniI.value.trim().toUpperCase())||genInitials(nm)||'';
      iniI.value=ini;
      save.disabled=true; save.textContent='…';
      const ok=await supaSetProfile(p.id, nm, ini);
      save.disabled=false; save.textContent='Save';
      if(ok){ p.full_name=nm; p.initials=ini; toast('Saved '+(nm||p.email)+'.'); renderAll(); }
    };

    row.appendChild(nameI); row.appendChild(iniI); row.appendChild(email);
    if(p.role==='manager'){ const m=document.createElement('span'); m.className='mr-mgr'; m.textContent='manager'; row.appendChild(m); }
    row.appendChild(save);
    box.appendChild(row);
  });
  refreshDupes();
}

let pmTargetProject=null;
let pmSelected=new Set();
function openProjMembers(projectId){
  if(!canManageProjects()){ toast('Only a manager can assign project members.'); return; }
  pmTargetProject=projectId;
  pmSelected=new Set(projectMemberIds(projectId));
  const p=state.projects.find(x=>x.id===projectId);
  document.getElementById('pmemTitle').textContent='Members of “'+((p&&p.name)||'project')+'”';
  const f=document.getElementById('pmemFilter'); if(f) f.value='';
  renderProjMembers('');
  document.getElementById('pmemScrim').classList.add('open');
}
function closeProjMembers(){ document.getElementById('pmemScrim').classList.remove('open'); pmTargetProject=null; }
function renderProjMembers(filter){
  const list=document.getElementById('pmemList'); if(!list) return;
  list.innerHTML='';
  const q=(filter||'').trim().toLowerCase();
  const matches=allProfiles.filter(p=>{
    if(!q) return true;
    return ((p.full_name||'').toLowerCase().indexOf(q)>=0) ||
           ((p.email||'').toLowerCase().indexOf(q)>=0) ||
           ((p.initials||'').toLowerCase().indexOf(q)>=0);
  });
  if(!matches.length){ list.innerHTML='<div class="picker-empty">No people match “'+escapeHtml(filter)+'”.</div>'; return; }
  matches.forEach(p=>{
    const lab=document.createElement('label'); lab.className='picker-opt';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=pmSelected.has(p.id);
    cb.onchange=()=>{ if(cb.checked) pmSelected.add(p.id); else pmSelected.delete(p.id); };
    const ini=document.createElement('span'); ini.className='po-ini'; ini.textContent=p.initials||(p.email||'').slice(0,3).toUpperCase();
    const col=document.createElement('span'); col.className='po-col';
    const nm=document.createElement('span'); nm.className='po-name'; nm.textContent=p.full_name||p.email||'Unknown';
    const em=document.createElement('span'); em.className='po-email'; em.textContent=p.email||'';
    col.appendChild(nm); col.appendChild(em);
    lab.appendChild(cb); lab.appendChild(ini); lab.appendChild(col);
    list.appendChild(lab);
  });
}
async function saveProjMembers(){
  if(!pmTargetProject) return closeProjMembers();
  await supaSetProjectMembers(pmTargetProject, Array.from(pmSelected));
  toast('Project members updated.');
  closeProjMembers();
  renderProjectManager(); renderAll();
}

/* ============================================================
   CHECKLIST ASSIGNEES (inline editor inside the task modal)
   ============================================================ */
function buildAssignEditor(item){
  const ed=document.createElement('div'); ed.className='assign-editor';
  const pid=activeProject().id;
  const ids=projectMemberIds(pid);
  // always offer the current user even if membership hasn't loaded a manager in
  const opts=ids.slice();
  if(myId() && opts.indexOf(myId())<0 && canManageProjects()) opts.push(myId());
  if(!opts.length){
    ed.innerHTML='<div class="ae-empty">No members on this project yet. A manager can add members from “Projects”.</div>';
    return ed;
  }
  if(!Array.isArray(item.assignees)) item.assignees=[];
  opts.forEach(uid=>{
    const lab=document.createElement('label'); lab.className='assign-opt';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.assignees.indexOf(uid)>=0;
    cb.onchange=()=>{
      if(cb.checked){ if(item.assignees.indexOf(uid)<0) item.assignees.push(uid); }
      else item.assignees=item.assignees.filter(x=>x!==uid);
      renderChecklist(); persistChecklistLive();
    };
    const ini=document.createElement('span'); ini.className='ao-ini'; ini.textContent=initialsOf(uid);
    const nm=document.createElement('span'); nm.className='ao-name'; nm.textContent=nameOf(uid)+(uid===myId()?' (you)':'');
    lab.appendChild(cb); lab.appendChild(ini); lab.appendChild(nm);
    ed.appendChild(lab);
  });
  return ed;
}

/* every checklist item assigned to me, across all my projects, with its task path */
function collectAssignedToMe(){
  const me=myId(); const out=[];
  state.projects.filter(p=>!p.archived).forEach(p=>{
    (function walk(list, path){
      (list||[]).forEach(n=>{
        const here=path.concat(n.name||'Untitled');
        if(Array.isArray(n.checklist)){
          n.checklist.forEach(c=>{
            if(Array.isArray(c.assignees) && c.assignees.indexOf(me)>=0){
              out.push({ projectId:p.id, projectName:p.name, nodeId:n.id, checkId:c.id,
                         text:c.text, done:!!c.done, abandoned:!!c.abandoned, reason:c.abandonReason||'',
                         assignees:c.assignees.slice(), path:here,
                         due:(n.task ? (n.task.endDate||n.task.startDate||n.task.date||'') : '') });
            }
          });
        }
        walk(n.children, here);
      });
    })(p.tree, []);
  });
  return out;
}

function assignedCount(){ return collectAssignedToMe().filter(x=>!x.done && !x.abandoned).length; }

function todoLinkExists(viewKey, projectId, nodeId, checkId){
  return (state.todos[viewKey]||[]).some(t=> t.linked && t.src &&
    t.src.p===projectId && t.src.n===nodeId && t.src.c===checkId);
}

/* pull a project checklist item into my personal to-dos for the day I'm viewing */
function pullToTodos(it){
  if(todoLinkExists(viewDate, it.projectId, it.nodeId, it.checkId)){
    toast('Already in your to-dos for this day.'); return;
  }
  todosFor(viewDate).push({
    id:uid(), text:it.text, state: it.done?'completed':'open', note:'',
    linked:true, src:{ p:it.projectId, n:it.nodeId, c:it.checkId }
  });
  toast('Added to your to-dos.');
  renderAssigned();
  renderTodos();
  scheduleSave();
}

/* ---- per-user "snooze": hide an assigned item from MY panel until a date ----
   Stored in state.todos.__snoozes (per-person, already synced) as
   { "projectId:nodeId:checkId": "YYYY-MM-DD" }.  Reappears on that date. */
function snoozeKeyFor(it){ return it.projectId+':'+it.nodeId+':'+it.checkId; }
function snoozedUntil(it){
  const s = state.todos && state.todos.__snoozes; if(!s) return '';
  const u = s[snoozeKeyFor(it)];
  return (u && todayKey() < u) ? u : '';        // snoozed only while today is before the date
}
function setSnooze(it, untilKey){
  const s = state.todos.__snoozes || (state.todos.__snoozes = {});
  if(untilKey) s[snoozeKeyFor(it)] = untilKey; else delete s[snoozeKeyFor(it)];
  scheduleSave();
  renderAssigned();
}

/* toggle the real checklist item's done state from the assigned tab (writes to the tree) */
async function setAssignedDone(it, done){
  const hit=findCheckItem(it.projectId, it.nodeId, it.checkId);
  if(!hit) return;
  hit.item.done=done;
  if(state.activeProjectId===it.projectId) renderTree();
  renderAssigned();
  renderTodos();   // keep any linked personal copy in sync
  await saveProjectById(it.projectId);
}

/* jump to + briefly highlight a task in the tree (used by the Assigned-to-me list) */
function expandTo(nodeId){
  let found=false;
  (function walk(list, ancestors){
    (list||[]).forEach(n=>{
      if(found) return;
      if(n.id===nodeId){ ancestors.forEach(a=>a.collapsed=false); found=true; return; }
      walk(n.children, ancestors.concat(n));
    });
  })(activeTree(), []);
  return found;
}
function revealNodeInTree(projectId, nodeId){
  if(state.activeProjectId!==projectId) switchProject(projectId);
  expandTo(nodeId);
  renderTree();
  requestAnimationFrame(()=>{
    const wrap=Array.from(projContainer.querySelectorAll('.node')).find(el=>el.dataset.id===nodeId);
    const row=wrap && wrap.querySelector('.node-row');
    if(row){
      row.scrollIntoView({block:'center',behavior:'smooth'});
      row.classList.remove('flash-highlight'); void row.offsetWidth;
      row.classList.add('flash-highlight');
      setTimeout(()=>row.classList.remove('flash-highlight'),1700);
    }
  });
}

/* Urgency dot for an assigned item — colour reflects how soon the parent
   subheader (its task) is due.  No due date → no dot (returns null). */
function urgencyInfo(dueKey){
  if(!dueKey) return null;
  const [y,m,d]=String(dueKey).split('-').map(Number);
  if(!y||!m||!d) return null;
  const due=new Date(y,m-1,d);
  const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const days=Math.round((due-today)/86400000);
  let color,label;
  if(days<=0){ color='#e5484d'; label = days<0 ? ('Overdue by '+(-days)+' day'+(-days===1?'':'s')) : 'Due today'; }
  else if(days<=2){ color='#f5820b'; label='Due in '+days+' day'+(days===1?'':'s'); }
  else if(days<=7){ color='#efc20a'; label='Due in '+days+' days'; }
  else            { color='#0bbf8e'; label='Due in '+days+' days'; }
  return { color, label, days };
}

/* ============================================================
   ABANDONING A PERSONAL TO-DO (with an optional reason)
   ============================================================ */
function abandonBlock(text, reason){ return "'"+text+"' abandoned.\nReason: \""+(reason||'')+"\""; }
function appendBlock(notes, block){ notes=(notes||'').replace(/\s+$/,''); return notes ? (notes+"\n\n"+block) : block; }
function removeBlock(notes, block){
  notes=notes||''; const i=notes.indexOf(block); if(i<0) return notes;
  const res=notes.slice(0,i)+notes.slice(i+block.length);
  return res.replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/^\s+|\s+$/g,'');
}
/* mark the SOURCE checklist item abandoned (red cross-out) and (re)write its line in the task's Notes */
function applyAbandonToTask(node, item, reason){
  if(!node.task) node.task=newTask();
  if(item.abandoned && item.abandonText!==undefined){              // editing an existing reason → replace its line
    node.task.notes = removeBlock(node.task.notes, abandonBlock(item.abandonText, item.abandonReason));
  }
  item.abandoned=true; item.done=false;
  item.abandonText=item.text; item.abandonReason=reason||'';
  node.task.notes = appendBlock(node.task.notes, abandonBlock(item.abandonText, item.abandonReason));
}
/* un-abandon: remove the Notes line and clear the red cross-out */
function clearAbandonFromTask(node, item){
  if(node.task && item.abandoned){
    const txt=(item.abandonText!==undefined)?item.abandonText:item.text;
    node.task.notes = removeBlock(node.task.notes, abandonBlock(txt, item.abandonReason));
  }
  item.abandoned=false; delete item.abandonReason; delete item.abandonText;
}

let abandonTodoId=null;
function requestAbandon(id){
  const it=todosFor(viewDate).find(x=>x.id===id); if(!it) return;
  abandonTodoId=id;
  const already = it.state==='abandoned';
  const linked  = !!(it.linked && it.src && findCheckItem(it.src.p,it.src.n,it.src.c));
  document.getElementById('abTitle').textContent   = already ? 'Abandoned to-do' : 'Abandon this to-do?';
  document.getElementById('abItemText').textContent= it.text || '(empty to-do)';
  document.getElementById('abReason').value        = it.reason || '';
  document.getElementById('abLinkedNote').style.display = linked ? '' : 'none';
  document.getElementById('abRestore').style.display    = already ? '' : 'none';
  document.getElementById('abConfirm').innerHTML   = already ? (svg('check')+'Save reason') : (svg('ban')+'Abandon');
  document.getElementById('abandonScrim').classList.add('open');
  setTimeout(()=>{ const r=document.getElementById('abReason'); if(r) r.focus(); },30);
}
function closeAbandon(){ document.getElementById('abandonScrim').classList.remove('open'); abandonTodoId=null; }
function confirmAbandon(){
  const it=todosFor(viewDate).find(x=>x.id===abandonTodoId); if(!it){ closeAbandon(); return; }
  const reason=document.getElementById('abReason').value.trim();
  it.state='abandoned'; it.reason=reason;
  if(it.linked && it.src){
    const hit=findCheckItem(it.src.p,it.src.n,it.src.c);
    if(hit){ applyAbandonToTask(hit.node, hit.item, reason); if(state.activeProjectId===it.src.p) renderTree(); saveProjectById(it.src.p); }
  }
  closeAbandon(); renderTodos(); renderAssigned(); scheduleSave();
}
function restoreAbandon(){
  const it=todosFor(viewDate).find(x=>x.id===abandonTodoId); if(!it){ closeAbandon(); return; }
  it.state='open'; delete it.reason;
  if(it.linked && it.src){
    const hit=findCheckItem(it.src.p,it.src.n,it.src.c);
    if(hit){ clearAbandonFromTask(hit.node, hit.item); if(state.activeProjectId===it.src.p) renderTree(); saveProjectById(it.src.p); }
  }
  closeAbandon(); renderTodos(); renderAssigned(); scheduleSave();
}

      };

  if(by+bh>window.innerHeight-10)  by=Math.max(10, window.innerHeight-bh-10);
  bal.style.left=bx+'px'; bal.style.top=by+'px';
  setTimeout(()=>{ document.addEventListener('mousedown',noteBalloonOutside,true); document.addEventListener('keydown',noteBalloonEsc,true); },0);
}
function noteBalloonOutside(e){ const b=document.getElementById('noteBalloon'); if(b && !b.contains(e.target)) closeNoteBalloon(); }
function noteBalloonEsc(e){ if(e.key==='Escape') closeNoteBalloon(); }
function closeNoteBalloon(){
  const b=document.getElementById('noteBalloon'); if(b) b.remove();
  document.removeEventListener('mousedown',noteBalloonOutside,true);
  document.removeEventListener('keydown',noteBalloonEsc,true);
}

/* ============================================================
   MEETING MINUTES  (per-project, kept inside the project's data so
   they ride realtime + backups). Saved entries are EDITABLE, not
   deleted — load one back into the editor and re-save to revise it.
   ============================================================ */
function meetingsOf(pid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p) return [];
  if(!Array.isArray(p.meetings)) p.meetings=[];
  return p.meetings;
}
function fmtStamp(iso){
  if(!iso) return '';
  const d=new Date(iso); if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})+' · '+
         d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function openMeetingMinutes(){

  const p=activeProject(); if(!p) return;

function saveCurrentMinutes(){
  if(!mmProjectId) return;

  const title=(document.getElementById('mmTitleInput').value||'').trim();

function renderMinutesList(){

    entry.appendChild(head); entry.appendChild(body);

/* whitelist sanitiser for stored minutes HTML */
function sanitizeHtml(html){
  const tpl=document.createElement('div'); tpl.innerHTML=String(html||'');
  const ALLOWED={B:1,STRONG:1,I:1,EM:1,U:1,UL:1,OL:1,LI:1,DIV:1,BR:1,SPAN:1,H3:1,P:1,A:1};
  const DROP={SCRIPT:1,STYLE:1,IFRAME:1,OBJECT:1,EMBED:1,TEMPLATE:1,NOSCRIPT:1,LINK:1,META:1,HEAD:1,TITLE:1,SVG:1};
  (function walk(node){
    Array.prototype.slice.call(node.childNodes).forEach(ch=>{
      if(ch.nodeType===8){ node.removeChild(ch); return; }   // strip comments
      if(ch.nodeType!==1) return;                            // keep text nodes
      if(DROP[ch.tagName]){ node.removeChild(ch); return; }  // drop these wholesale (content too)
      walk(ch);                                              // clean descendants first
      if(!ALLOWED[ch.tagName]){                              // unwrap other unknown elements
        while(ch.firstChild) node.insertBefore(ch.firstChild, ch);
        node.removeChild(ch);
        return;
      }
      Array.prototype.slice.call(ch.attributes).forEach(a=>{
        const n=a.name.toLowerCase(), v=String(a.value||'');
        const keepClass = (n==='class' && /^(mm-task|mm-box|mm-task-text)(\s+(mm-task|mm-box|mm-task-text))*$/.test(v.trim()));
        const keepData  = (n==='data-done');
        const keepCE    = (n==='contenteditable');
        const keepHref  = (ch.tagName==='A' && n==='href' && /^(https?:|mailto:)/i.test(v.trim()));
        if(!(keepClass||keepData||keepCE||keepHref)) ch.removeAttribute(a.name);
      });
      if(ch.tagName==='A'){ ch.setAttribute('target','_blank'); ch.setAttribute('rel','noopener noreferrer'); }
    });
  })(tpl);
  return tpl.innerHTML;
}
function stripTags(html){ const d=document.createElement('div'); d.innerHTML=String(html||''); return d.textContent||d.innerText||''; }
function mmExec(cmd){
  const ed=document.getElementById('mmEditor'); if(!ed) return;
  ed.focus();
  switch(cmd){
    case 'bold':   document.execCommand('bold'); break;
    case 'italic': document.execCommand('italic'); break;
    case 'h3':     document.execCommand('formatBlock', false, 'H3'); break;
    case 'ul':     document.execCommand('insertUnorderedList'); break;
    case 'ol':     document.execCommand('insertOrderedList'); break;
    case 'date':   document.execCommand('insertText', false, new Date().toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})); break;
    case 'check':  document.execCommand('insertHTML', false,
      '<div class="mm-task" data-done="0"><span class="mm-box" contenteditable="false"></span><span class="mm-task-text">\u200b</span></div>'); break;
  }
}

/* ============================================================
   REALTIME SYNC  (Supabase) — patches the screen in place when a
   teammate changes a project or this user's to-dos change elsewhere,
   without reloading and without disturbing what's being edited here.
   Requires the projects + user_todos tables to be in the
   supabase_realtime publication (see the setup notes).
   ============================================================ */
function isModalOpen(id){ const m=document.getElementById(id); return !!(m && m.classList.contains('open')); }
function isAnyEditorOpen(){
  if(isModalOpen('taskScrim') || isModalOpen('minScrim')) return true;
  const ae=document.activeElement;
  return !!(ae && (ae.isContentEditable || ae.tagName==='INPUT' || ae.tagName==='TEXTAREA'));
}
function lockedProjectIds(){
  const ids=new Set();
  if(isModalOpen('taskScrim') && modalNodeId && !isGuideActive()) ids.add(activeProject().id);
  if(isModalOpen('minScrim') && mmProjectId) ids.add(mmProjectId);
  const ae=document.activeElement;
  if(ae && ae.isContentEditable && !isGuideActive()) ids.add(activeProject().id);   // inline rename / typing in the tree
  return ids;
}
function projectIsLocked(pid){ return lockedProjectIds().has(pid); }

function applyProjectRow(row){
  const incoming=rowToProject(row);
  const idx=state.projects.findIndex(p=>p.id===incoming.id);
  if(idx<0){
    state.projects.push(incoming); dbProjectIds.add(incoming.id);
    rememberProjData(incoming);
    renderProjectSelect();
    return;
  }
  const cur=state.projects[idx];
  cur.name=incoming.name; cur.archived=incoming.archived;
  cur.tree=incoming.tree; cur.calendarSelection=incoming.calendarSelection; cur.meetings=incoming.meetings;
  rememberProjData(cur);
  renderProjectSelect();
  if(state.activeProjectId===cur.id){ renderTree(); renderCalendar(); }
  renderAssigned();
  if(isModalOpen('minScrim') && mmProjectId===cur.id && !mmEditingId) renderMinutesList();
}

function onProjectChange(payload){
  const evt=payload.eventType||payload.event;
  if(evt==='DELETE'){
    const id=payload.old && payload.old.id; if(!id) return;
    const wasActive=(state.activeProjectId===id);
    state.projects=state.projects.filter(p=>p.id!==id);
    dbProjectIds.delete(id); delete lastProjData[id]; delete pendingProj[id];
    if(wasActive) state.activeProjectId=null;
    renderProjectSelect();
    if(wasActive){ renderTree(); renderCalendar(); }
    renderAssigned();
    return;
  }
  const row=payload.new; if(!row || !row.id) return;
  const d=(row.data && typeof row.data==='object') ? row.data : {};
  const incomingJSON=JSON.stringify(strip({ tree:Array.isArray(d.tree)?d.tree:[], calendarSelection:(d.calendarSelection&&typeof d.calendarSelection==='object')?d.calendarSelection:{}, meetings:Array.isArray(d.meetings)?d.meetings:[] }));
  const cur=state.projects.find(p=>p.id===row.id);
  const sameData=(lastProjData[row.id]===incomingJSON);
  const sameMeta=cur && cur.name===(row.name||'Untitled project') && (!!cur.archived===!!row.archived);
  if(sameData && sameMeta) return;                       // our own echo / nothing new
  if(projectIsLocked(row.id)){ pendingProj[row.id]=row; return; }   // don't clobber an open editor
  applyProjectRow(row);
}

function onTodoChange(payload){
  const row=payload.new; if(!row) return;
  const data=(row.data && typeof row.data==='object') ? row.data : {};
  const incomingJSON=JSON.stringify(data);
  if(incomingJSON===lastTodosJSON) return;               // our own echo
  const ae=document.activeElement;
  if(isModalOpen('taskScrim') || (ae && ae.id==='todoInput')){ pendingTodos=data; return; }
  state.todos=data; lastTodosJSON=incomingJSON;
  renderTodos(); renderAssigned();
}

function flushPendingRealtime(){
  if(isAnyEditorOpen()) return;
  Object.keys(pendingProj).forEach(id=>{
    const row=pendingProj[id];
    if(row && !projectIsLocked(id)){ applyProjectRow(row); delete pendingProj[id]; }
  });
  if(pendingTodos){
    state.todos=pendingTodos; lastTodosJSON=JSON.stringify(pendingTodos); pendingTodos=null;
    renderTodos(); renderAssigned();
  }
}

function stopRealtime(){ rtChannels.forEach(ch=>{ try{ sb.removeChannel(ch); }catch(e){} }); rtChannels=[]; }
function startRealtime(){
  if(!sb || !currentUser) return;
  stopRealtime();
  lastTodosJSON=JSON.stringify(state.todos||{});
  try{
    const projCh=sb.channel('rt-projects')
      .on('postgres_changes', { event:'*', schema:'public', table:'projects' }, onProjectChange)
      .subscribe();
    rtChannels.push(projCh);
    const todoCh=sb.channel('rt-todos')
      .on('postgres_changes', { event:'*', schema:'public', table:'user_todos', filter:'user_id=eq.'+currentUser.id }, onTodoChange)
      .subscribe();
    rtChannels.push(todoCh);
  }catch(e){ /* realtime not enabled yet — the app still works, just without live updates */ }
}

/* ---------- load (after login) ---------- */
async function supaLoad(){
  setSyncStatus('Loading…');
  const { data:{ user } } = await sb.auth.getUser();
  currentUser = user;

  // role
  try{
    const { data: prof } = await sb.from('profiles').select('role').eq('id', user.id).maybeSingle();
    currentRole = (prof && prof.role==='manager') ? 'manager' : 'member';
  }catch(e){ currentRole = 'member'; }

  // projects (RLS auto-filters: members see active only; managers also see archived)
  let projRows = [];
  try{
    const { data, error } = await sb.from('projects')
      .select('id,name,archived,data,position,created_at')
      .order('position', { ascending:true, nullsFirst:false })
      .order('created_at', { ascending:true });
    if(error) throw error;
    projRows = data || [];
  }catch(e){ toast('Could not load projects: '+(e.message||e)); }
  state.projects = projRows.map(rowToProject);
  dbProjectIds = new Set(state.projects.map(p=>p.id));
  lastProjData = {};
  state.projects.forEach(rememberProjData);

  // this user's to-do list
  try{
    const { data: todoRow } = await sb.from('user_todos').select('data').eq('user_id', user.id).maybeSingle();
    state.todos = (todoRow && todoRow.data && typeof todoRow.data==='object') ? todoRow.data : {};
  }catch(e){ state.todos = state.todos || {}; }

  // people directory (everyone) + per-project membership (RLS shows only what I'm allowed to see)
  await loadPeople();
  // the editable "Start here / Guide" page text
  await loadGuide();

  state.activeProjectId = null;

  // a manager opening an empty board gets one real starter project
  if(state.projects.length===0 && canManageProjects()){
    await supaInsertProject('Project 1');
  }

  ensureProjects();
  rollForwardPostponed();
  viewDate = todayKey();
  renderAll();
  reflectPermissions();
  supaSaveTodos();          // persist any roll-forward changes
  startRealtime();          // live updates from teammates (no page reloads)
  setSyncStatus('Synced');
}
