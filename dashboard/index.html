/* ============================================================
   PROJECT TREE
   ============================================================ */
let projContainer;

/* ============================================================
   PROJECTS  —  switch via dropdown; add / rename / archive in the
   manager modal (a supervised, manager-level surface). Deletion is
   intentionally not offered: projects are archived (data is kept and
   can be restored later), never destroyed.
   The to-do panel is shared and does not change with the project.
   ============================================================ */

/* the project tab strip (active = non-archived); the Guide tab is always first.
   Kept named renderProjectSelect so all existing callers keep working. */
function renderProjectSelect(){
  ensureProjects();
  const scroll=document.getElementById('ptScroll');
  const nameEl=document.getElementById('activeProjName');
  if(nameEl) nameEl.textContent = isGuideActive() ? 'Start here / Guide' : (activeProject().name||'Project');
  const bMin=document.getElementById('btnMinutes');
  if(bMin) bMin.style.display = isGuideActive() ? 'none' : '';
  if(!scroll) return;
  scroll.innerHTML='';
  const manager=canManageProjects();

  function tab(id, label, isGuide){
    const t=document.createElement('button');
    t.className='pt-tab'+(isGuide?' guide':'')+(state.activeProjectId===id?' active':'');
    t.dataset.pid=id;
    const dot=document.createElement('span'); dot.className='pt-dot';
    const nm=document.createElement('span'); nm.className='pt-name'; nm.textContent=label; nm.title=label;
    t.appendChild(dot); t.appendChild(nm);
    t.onclick=()=>switchProject(id);
    if(!isGuide && manager) setupTabDrag(t, id);
    scroll.appendChild(t);
  }

  tab(GUIDE_ID, 'Start here / Guide', true);
  state.projects.filter(p=>!p.archived).forEach(p=> tab(p.id, p.name||'Untitled project', false));

  setTimeout(()=>{
    const act=scroll.querySelector('.pt-tab.active');
    if(act && act.scrollIntoView) act.scrollIntoView({inline:'nearest',block:'nearest'});
    updateTabArrows();
  },0);
}

function updateTabArrows(){
  const scroll=document.getElementById('ptScroll');
  const l=document.getElementById('ptLeft'), r=document.getElementById('ptRight');
  if(!scroll||!l||!r) return;
  const overflow = scroll.scrollWidth > scroll.clientWidth + 2;
  l.classList.toggle('show', overflow && scroll.scrollLeft > 2);
  r.classList.toggle('show', overflow && (scroll.scrollLeft + scroll.clientWidth) < (scroll.scrollWidth - 2));
}

/* ---- drag-to-reorder project tabs (manager-only) ---- */
let tabDragId=null;
function clearTabMarks(){
  document.querySelectorAll('#ptScroll .pt-tab').forEach(t=>t.classList.remove('drop-before','drop-after'));
}
function setupTabDrag(tab, id){
  tab.draggable=true;
  tab.addEventListener('dragstart',e=>{ tabDragId=id; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',id);}catch(_){} tab.classList.add('dragging'); });
  tab.addEventListener('dragend',()=>{ tabDragId=null; tab.classList.remove('dragging'); clearTabMarks(); });
  tab.addEventListener('dragover',e=>{
    if(!tabDragId||tabDragId===id) return;
    e.preventDefault();
    const r=tab.getBoundingClientRect();
    const after=(e.clientX - r.left) > r.width/2;
    clearTabMarks();
    tab.classList.add(after?'drop-after':'drop-before');
  });
  tab.addEventListener('dragleave',()=>tab.classList.remove('drop-before','drop-after'));
  tab.addEventListener('drop',e=>{
    if(!tabDragId||tabDragId===id) return;
    e.preventDefault();
    const r=tab.getBoundingClientRect();
    const after=(e.clientX - r.left) > r.width/2;
    moveProjectTab(tabDragId, id, after);
    clearTabMarks();
  });
}
function moveProjectTab(dragId, targetId, after){
  if(!canManageProjects()) return;
  if(dragId===GUIDE_ID || targetId===GUIDE_ID) return;   // the guide tab stays first
  const arr=state.projects;
  const from=arr.findIndex(p=>p.id===dragId); if(from<0) return;
  const moved=arr.splice(from,1)[0];
  let to=arr.findIndex(p=>p.id===targetId);
  if(to<0){ arr.splice(from,0,moved); return; }
  if(after) to+=1;
  arr.splice(to,0,moved);
  renderProjectSelect();
  supaSaveProjectOrder();
}
async function supaSaveProjectOrder(){
  if(!sb || !canManageProjects()) return;
  const updates=state.projects.map((p,i)=>({ id:p.id, position:i })).filter(u=>dbProjectIds.has(u.id));
  for(const u of updates){
    const { error } = await sb.from('projects').update({ position:u.position }).eq('id', u.id);
    if(error){ toast('Could not save tab order: '+error.message); break; }
  }
}

function switchProject(id){
  ensureProjects();
  if(id!==GUIDE_ID && !state.projects.some(p=>p.id===id && !p.archived)) return;
  guideEditing=false;
  state.activeProjectId=id;
  renderProjectSelect(); renderTree(); renderCalendar(); reflectPermissions();
  /* No save: which project is active is a per-session view choice, not stored in the DB. */
}

async function addProject(name){
  if(!canManageProjects()){ toast('You don’t have permission to add projects.'); return null; }
  ensureProjects();
  name=(name||'').trim() || ('Project '+(state.projects.length+1));

function projRow(p, isArchived){
  const row=document.createElement('div'); row.className='proj-row'+(isArchived?' archived':'');

    });
    name.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ e.preventDefault(); name.blur(); }
      if(e.key==='Escape'){ name.textContent=p.name; name.blur(); }
    });
  }

  const count=document.createElement('span'); count.className='pr-count';
  const n=countNodes(p.tree); count.textContent=n+' task'+(n===1?'':'s');

  let memb=null, membersBtn=null;

    const mc=projectMemberIds(p.id).length;

  row.appendChild(name); row.appendChild(count);
  if(memb) row.appendChild(memb);
  if(membersBtn) row.appendChild(membersBtn);
  row.appendChild(act);
  return row;
}

function countNodes(list){
  let c=0; (function w(a){ (a||[]).forEach(n=>{ c++; w(n.children); }); })(list); return c;
}

/* find a node + its parent array by id */
function findNode(id, list=activeTree(), parent=null){
  for(let i=0;i<list.length;i++){
    if(list[i].id===id) return {node:list[i], list, index:i, parent};
    const r=findNode(id, list[i].children, list[i]);
    if(r) return r;
  }
  return null;
}
function makeNode(name){
  return {id:uid(), name:name||'New heading', collapsed:false, color:'', task:newTask(), checklist:[], children:[]};
}

/* ---------- annotate the tree with transient (underscore = not saved) data ----------
   _color      : per-branch family colour for the node
   _conflict   : true when this node's END date is later than an ancestor's, or
                 earlier than a descendant's (deadline contradiction)
   _subtreeMax : max END date within this node's subtree (helper for conflict)        */
function taskDeadline(node){                 // the date a task is "due" — its end date (fallback to start)
  const t=node.task; if(!t) return '';
  return t.endDate || t.startDate || '';
}

/* migrate older single-date tasks → start/end model (idempotent, cheap) */
function migrateTasks(){
  (function walk(list){
    list.forEach(n=>{
      const t=n.task;
      if(t){
        if(t.date!==undefined){                       // legacy field
          if(!t.startDate) t.startDate=t.date;
          if(!t.endDate)   t.endDate=t.date;
          delete t.date;
        }
        if(t.startDate===undefined) t.startDate='';
        if(t.endDate===undefined)   t.endDate='';
        if(t.startTime===undefined) t.startTime='';
        if(t.endTime===undefined)   t.endTime='';
        if(t.notes===undefined)      t.notes='';
      }
      walk(n.children);
    });
  })(activeTree());
}

function hslToHex(h,s,l){
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const k=n=>(n+h/30)%12;
  const f=n=>{ const v=l - a*Math.max(-1,Math.min(k(n)-3, 9-k(n), 1)); return Math.round(255*v); };
  const hx=x=>x.toString(16).padStart(2,'0');
  return '#'+hx(f(0))+hx(f(8))+hx(f(4));
}
function assignColors(){
  // each top-level branch gets a distinct family hue; descendants are derived from their PARENT's colour
  activeTree().forEach((root,i)=>{
    const hue=(i*137.508)%360;            // golden-angle spread → distinct family hue per top-level branch
    colorWalk(root, {h:hue, s:64, l:42});
  });
}
function colorWalk(node, hsl){
  const h=(((hsl.h%360)+360)%360);
  const auto='hsl('+h.toFixed(0)+','+hsl.s.toFixed(0)+'%,'+hsl.l.toFixed(0)+'%)';
  node._auto=auto;
  node._autoHex=hslToHex(h, hsl.s, hsl.l);              // for pre-filling the colour picker
  node._color=(node.color && node.color.trim()) ? node.color : auto;   // manual override wins for display
  const k=node.children.length;
  node.children.forEach((c,i)=>{
    // siblings fan slightly around the parent hue; every level gets lighter & a touch less saturated.
    // The lineage is derived from the AUTO hue, so overriding one node only recolours that node.
    const fan = k>1 ? (i-(k-1)/2) * Math.min(16, 70/k) : 0;
    colorWalk(c, {
      h: hsl.h + fan,
      s: Math.max(38, hsl.s - 3),
      l: Math.min(78, hsl.l + 9)
    });
  });
}

function computeConflicts(){
  // pass 1: max END date in each subtree
  (function maxWalk(list){
    list.forEach(n=>{
      maxWalk(n.children);
      let m=taskDeadline(n);
      n.children.forEach(c=>{ if(c._subtreeMax>m) m=c._subtreeMax; });
      n._subtreeMax=m;
    });
  })(activeTree());
  // pass 2: flag conflicts (minAncestor = earliest dated ancestor's end date)
  (function walk(list, minAncestor){
    list.forEach(n=>{
      const d=taskDeadline(n);
      let conflict=false;
      if(d){
        if(minAncestor && d>minAncestor) conflict=true;                 // ends later than an ancestor
        n.children.forEach(c=>{ if(c._subtreeMax && c._subtreeMax>d) conflict=true; }); // a descendant ends later
      }
      n._conflict=conflict;
      let childMin=minAncestor;
      if(d && (!childMin || d<childMin)) childMin=d;
      walk(n.children, childMin);
    });
  })(activeTree(), '');
}

/* run migration + annotations before any tree/calendar render */
function annotateTree(){ migrateTasks(); assignColors(); computeConflicts(); }

/* every calendar day a task occupies (start date → end date, inclusive) */
function taskDays(task){
  if(!task) return [];
  let sd=task.startDate||task.endDate||'';
  let ed=task.endDate||task.startDate||'';
  if(!sd) return [];
  if(ed<sd){ const t=sd; sd=ed; ed=t; }    // tolerate a reversed range
  const out=[]; let k=sd, guard=0;
  while(k<=ed && guard<2000){ out.push(k); k=addDaysKey(k,1); guard++; }
  return out;
}

/* dated tasks that should appear on the calendar, grouped by date — every day in each task's range.
   Each node is shown independently: ticking a header does NOT pull in its subheaders. */
function calendarDots(){
  const map={};
  (function walk(list){
    list.forEach(n=>{
      if(activeCalSel()[n.id]){
        taskDays(n.task).forEach(k=>{
          (map[k]||(map[k]=[])).push({color:n._color, name:n.name, start:n.task.startTime, end:n.task.endTime});
        });
      }
      walk(n.children);
    });
  })(activeTree());
  return map;
}

/* DD/MM/YYYY */
function fmtDMY(key){
  if(!key) return '';
  const [y,m,d]=key.split('-').map(Number);
  return pad(d)+'/'+pad(m)+'/'+y;
}

function renderTree(){
  if(isGuideActive()){ renderGuide(); return; }
  annotateTree();
  projContainer.innerHTML='';
  if(!activeTree().length){
    projContainer.innerHTML='<div class="proj-empty">No headings yet.<br>Use “Add heading” to start your project tree.</div>';
    return;
  }
  activeTree().forEach(n=> projContainer.appendChild(renderNode(n,0)));
}

function renderNode(node, depth){
  const wrap=document.createElement('div');
  wrap.className='node'+(node.collapsed?' collapsed':'');
  wrap.dataset.depth=depth; wrap.dataset.id=node.id;

  const row=document.createElement('div');
  row.className='node-row';
  const st=node.task&&node.task.state;
  if(st==='completed') row.classList.add('completed');
  if(st==='abandoned') row.classList.add('abandoned');
  row.draggable=false; // dragging initiated from handle
  row.dataset.id=node.id;

  const hasKids=node.children.length>0;

  /* drag handle */
  const handle=document.createElement('span');
  handle.className='drag-handle'; handle.innerHTML=svg('grip');
  handle.title='Drag to reorder';
  handle.addEventListener('mousedown',()=>{ row.draggable=true; });
  handle.addEventListener('mouseup',()=>{ row.draggable=false; });

  /* twirl / collapse */
  const tw=document.createElement('button');
  tw.className='twirl'+(hasKids?'':' leaf');
  tw.innerHTML=svg('chevron');
  tw.title=node.collapsed?'Expand':'Collapse';
  tw.onclick=()=>toggleCollapse(node.id);

  /* calendar checkbox — show this branch's dated tasks as dots on the calendar */
  const chk=document.createElement('input');
  chk.type='checkbox'; chk.className='node-check';
  chk.checked=!!activeCalSel()[node.id];
  chk.title='Show this task’s dates on the calendar';
  chk.disabled = !canEditProjects();
  chk.onclick=e=>e.stopPropagation();
  chk.onchange=()=>{
    if(!requireProjectEdit()){ chk.checked=!!activeCalSel()[node.id]; return; }
    if(chk.checked) activeCalSel()[node.id]=true;
    else delete activeCalSel()[node.id];
    scheduleSave(); renderCalendar();
  };

  /* per-branch colour dot (matches the calendar dot colour) */
  const cdot=document.createElement('span');
  cdot.className='node-dot'; cdot.style.background=node._color;
  cdot.title='Calendar colour for this branch';

  /* label — read-only by default; double-click opens the task, the pencil renames in place */
  const label=document.createElement('div');
  label.className='node-label';
  label.contentEditable='false';
  label.spellcheck=false;
  label.dataset.label=node.id;
  label.textContent=node.name;
  label.title='Double-click to open · use the pencil to rename';
  label.addEventListener('dblclick',()=>openTaskModal(node.id));
  label.addEventListener('blur',()=>{
    label.contentEditable='false';
    const v=label.textContent.trim();
    if(!v){ label.textContent=node.name; return; }      // never accept an empty name
    if(v!==node.name){ node.name=v; scheduleSave(); renderProjectSelect(); }
    label.textContent=node.name;
  });
  label.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); label.blur(); }
    if(e.key==='Escape'){ label.textContent=node.name; label.blur(); }
  });

  /* state chip */
  let chip='';
  if(st && st!=='open'){
    chip=document.createElement('span');
    chip.className='state-chip '+st;
    chip.textContent = st==='completed'?'done':st==='postponed'?'postponed':'abandoned';
  }

  /* date badge: "start: DD/MM/YYYY · end: DD/MM/YYYY" (end turns red on a deadline conflict) */
  let when='';
  const tk=node.task;
  if(tk && (tk.startDate || tk.endDate)){
    when=document.createElement('span'); when.className='node-when';
    const parts=[];
    if(tk.startDate){
      const s=document.createElement('span');
      s.textContent='start: '+fmtDMY(tk.startDate)+(tk.startTime?' '+tk.startTime:'');
      parts.push(s);
    }
    if(tk.endDate){
      const e=document.createElement('span');
      if(node._conflict) e.className='conflict';
      e.textContent='end: '+fmtDMY(tk.endDate)+(tk.endTime?' '+tk.endTime:'');
      parts.push(e);
    }
    parts.forEach((p,i)=>{
      if(i>0){ const sep=document.createElement('span'); sep.className='when-sep'; sep.textContent=' · '; when.appendChild(sep); }
      when.appendChild(p);
    });
    when.title=node._conflict
      ? 'Date conflict: this end date is later than a parent task’s end date, or earlier than a sub-task’s end date.'
      : 'Task start / end dates';
  }

  /* action buttons: [+] heading  [⤶] subheading  [✎] rename  [🗒] preview */
  const actions=document.createElement('div');
  actions.className='node-actions';
  actions.appendChild(iconBtn('plus','Add heading below','accent',()=>addHeading(node.id)));
  actions.appendChild(iconBtn('subPlus','Add subheading','accent',()=>addSubheading(node.id)));
  actions.appendChild(iconBtn('edit','Rename','accent',()=>startRename(node.id)));
  const noteBtn=iconBtn('notepad','View details, notes & to-dos','accent',()=>{});
  noteBtn.onclick=()=>openNoteBalloon(node.id, noteBtn);
  actions.appendChild(noteBtn);

  row.appendChild(handle);
  row.appendChild(tw);
  row.appendChild(chk);
  row.appendChild(cdot);
  row.appendChild(label);
  if(when) row.appendChild(when);
  if(chip) row.appendChild(chip);
  row.appendChild(actions);
  wrap.appendChild(row);

  setupDrag(row, node);

  if(hasKids){
    const kids=document.createElement('div');
    kids.className='children';
    node.children.forEach(c=> kids.appendChild(renderNode(c, depth+1)));
    wrap.appendChild(kids);
  }
  return wrap;
}

function iconBtn(icon,title,cls,fn){
  const b=document.createElement('button');
  b.className='ibtn '+(cls||''); b.title=title; b.innerHTML=svg(icon);
  b.onclick=fn; return b;
}
/* enter inline rename on a tree label (rejects an empty name on blur) */
function startRename(id){
  if(!requireProjectEdit()) return;
  const el=document.querySelector('.node-label[data-label="'+id+'"]');
  if(!el) return;
  el.contentEditable='true';
  el.focus();

  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);

/* ---------- drag & drop reordering ---------- */
let dragId=null;
function setupDrag(row, node){
  row.addEventListener('dragstart',e=>{
    dragId=node.id;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',node.id);
    setTimeout(()=>row.style.opacity='.4',0);
  });
  row.addEventListener('dragend',()=>{
    row.style.opacity=''; row.draggable=false; dragId=null;
    clearDropMarks();
  });
  row.addEventListener('dragover',e=>{
    e.preventDefault();
    if(!dragId||dragId===node.id) return;
    if(isDescendant(dragId,node.id)) return; // can't drop into own subtree
    clearDropMarks();
    const r=row.getBoundingClientRect();
    const y=e.clientY-r.top;
    if(y < r.height*0.28) row.classList.add('drop-before');
    else if(y > r.height*0.72) row.classList.add('drop-after');
    else row.classList.add('dragover-into');
  });
  row.addEventListener('dragleave',()=>{ row.classList.remove('drop-before','drop-after','dragover-into'); });
  row.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation();
    if(!dragId||dragId===node.id) return;
    if(isDescendant(dragId,node.id)){ clearDropMarks(); return; }
    let mode='into';
    if(row.classList.contains('drop-before')) mode='before';
    else if(row.classList.contains('drop-after')) mode='after';
    moveNode(dragId, node.id, mode);
    clearDropMarks();
  });
}
function clearDropMarks(){
  projContainer.querySelectorAll('.drop-before,.drop-after,.dragover-into')
    .forEach(el=>el.classList.remove('drop-before','drop-after','dragover-into'));
}
function isDescendant(ancestorId, maybeChildId){
  const f=findNode(ancestorId); if(!f) return false;
  const stack=[...f.node.children];
  while(stack.length){ const n=stack.pop(); if(n.id===maybeChildId) return true; stack.push(...n.children); }
  return false;
}
function moveNode(dragId, targetId, mode){
  if(!requireProjectEdit()) return;
  const src=findNode(dragId); if(!src) return;
  const moved=src.node;
  src.list.splice(src.index,1);            // detach
  const tgt=findNode(targetId); if(!tgt){ renderTree(); return; }
  if(mode==='into'){ tgt.node.collapsed=false; tgt.node.children.push(moved); }
  else{
    const idx = mode==='before'? tgt.index : tgt.index+1;
    tgt.list.splice(idx,0,moved);
  }
  renderTree(); scheduleSave();
}

   ============================================================ */
let modalNodeId=null;
let modalColor='';                 // current colour override for the open modal ('' = automatic)
let modalChecklist=[];             // LIVE reference to the open task's checklist (edits save immediately)

/* checklist edits save the instant they happen, so nothing is lost if the
   modal is closed without pressing Save (the rest of the fields still use Save). */
function persistChecklistLive(){
  renderTree(); renderCalendar(); renderAssigned(); scheduleSave();
}

function renderChecklist(){
  const box=document.getElementById('tmChecklist');
  box.innerHTML='';
  if(!modalChecklist.length){
    box.innerHTML='<div class="checklist-empty">No items yet. Add one below.</div>';
    return;
  }
  modalChecklist.forEach(item=> box.appendChild(buildCheckItem(item)));
}
function buildCheckItem(item){
  const row=document.createElement('div');
  row.className='check-item'+(item.done?' done':'')+(item.abandoned?' abandoned':'');
  if(!Array.isArray(item.assignees)) item.assignees=[];

  const cb=document.createElement('input');
  cb.type='checkbox'; cb.checked=!!item.done;
  cb.onchange=()=>{ item.done=cb.checked; row.classList.toggle('done',cb.checked); persistChecklistLive(); };

  const txt=document.createElement('div');
  txt.className='ci-text'; txt.contentEditable='true'; txt.spellcheck=false;
  txt.textContent=item.text;
  txt.addEventListener('input',()=>{ item.text=txt.textContent; });
  txt.addEventListener('blur',()=>{
    item.text=txt.textContent.trim();
    if(!item.text){ const i=modalChecklist.indexOf(item); if(i>=0) modalChecklist.splice(i,1); renderChecklist(); }
    persistChecklistLive();
  });
  txt.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); txt.blur(); } });

  const who=document.createElement('span'); who.className='assignees';
  item.assignees.forEach(uid=>{
    const c=document.createElement('span'); c.className='ini-chip'+(uid===myId()?' mine':'');
    c.textContent=initialsOf(uid); c.title=nameOf(uid);
    who.appendChild(c);
  });

  const ab=document.createElement('button');
  ab.type='button'; ab.className='assign-btn';
  ab.title=item._editAssignees ? 'Done assigning' : 'Assign people to this item';
  ab.innerHTML = item._editAssignees ? svg('check') : '+';
  ab.onclick=()=>{ item._editAssignees=!item._editAssignees; renderChecklist(); };

  const rem=document.createElement('button');
  rem.type='button'; rem.className='check-rem'; rem.title='Remove item'; rem.innerHTML=svg('x');
  rem.onclick=()=>{
    const i=modalChecklist.indexOf(item);
    if(i>=0) modalChecklist.splice(i,1);
    renderChecklist(); persistChecklistLive();
  };

  row.appendChild(cb); row.appendChild(txt); row.appendChild(who); row.appendChild(ab); row.appendChild(rem);
  if(item._editAssignees) row.appendChild(buildAssignEditor(item));
  return row;
}
function addCheckItem(){
  const inp=document.getElementById('tmCheckInput');
  const t=inp.value.trim(); if(!t) return;
  modalChecklist.push({id:uid(), text:t, done:false, assignees: myId()?[myId()]:[]});  // creator is the default assignee
  renderChecklist();
  inp.value=''; inp.focus();
  persistChecklistLive();
}

function setTimeVisible(on){
  document.getElementById('tmTimeRow').style.display = on ? 'flex' : 'none';
}
function openTaskModal(id){
  const f=findNode(id); if(!f) return;
  modalNodeId=id;
  const t=f.node.task||(f.node.task=newTask());

  document.getElementById('tmName').value=f.node.name;
  document.getElementById('tmDetails').value=t.details||'';
  document.getElementById('tmNotes').value=t.notes||'';
  document.getElementById('tmStartDate').value=t.startDate||'';
  document.getElementById('tmEndDate').value=t.endDate||'';
  const hasTime=!!(t.startTime||t.endTime);
  document.getElementById('tmHasTime').checked=hasTime;
  document.getElementById('tmStart').value=t.startTime||'';
  document.getElementById('tmEnd').value=t.endTime||'';
  setTimeVisible(hasTime);
  modalColor = (f.node.color && f.node.color.trim()) ? f.node.color : '';

function closeTaskModal(){

let modalState='open';
function setModalState(s){
  modalState=s;
  ['completed','postponed','abandoned'].forEach(k=>{
    document.getElementById('pick-'+k).classList.toggle('sel', k===s);
    document.getElementById('pick-'+k).classList.add(k);

function pickState(s){ setModalState(modalState===s?'open':s); }

function saveTaskModal(){
  if(!requireProjectEdit()){ closeTaskModal(); return; }
  const f=findNode(modalNodeId); if(!f){ closeTaskModal(); return; }
  const n=f.node;
  n.name = document.getElementById('tmName').value.trim()||'Untitled';

  n.task.notes = document.getElementById('tmNotes').value;

/* delete from inside the modal, with confirmation */
function requestDeleteTask(){
  const f=findNode(modalNodeId); if(!f) return;

    'Delete this task?',

/* ---------- generic confirm dialog ---------- */
let confirmFn=null;

/* ============================================================
   TO-DO LIST
   ============================================================ */
let viewDate = todayKey();   // which day is shown in the panel

function todosFor(key){ return state.todos[key] || (state.todos[key]=[]); }

/* On launch / new day: carry postponed items forward to the literal next day. */
function rollForwardPostponed(){
  const today=todayKey();
  const last=state.lastOpened;
  // Walk every stored day strictly before today; push postponed items to day+1.
  const keys=Object.keys(state.todos).filter(k=>k<today).sort();
  keys.forEach(k=>{
    const items=state.todos[k];
    items.forEach(it=>{
      if(it.state==='postponed' && !it._rolled){
        const next=addDaysKey(k,1);
        const dst=todosFor(next);
        // avoid duplicating if already carried
        if(!dst.some(d=>d._origin===it.id)){
          dst.push({id:uid(), text:it.text, state:'open',
                    carriedFrom:k, _origin:it.id, note:''});
        }
        it._rolled=true;   // mark source so we don't roll it again
      }
    });
  });
  state.lastOpened=today;
}

function addTodo(text){
  text=text.trim(); if(!text) return;
  todosFor(viewDate).push({id:uid(), text, state:'open', note:''});
  renderTodos(); scheduleSave();
}
function setTodoState(id, s){
  const list=todosFor(viewDate);
  const it=list.find(x=>x.id===id); if(!it) return;
  it.state = it.state===s ? 'open' : s;   // toggle off if same
  // when newly postponed, immediately roll forward to next calendar day
  if(it.state==='postponed'){
    const next=addDaysKey(viewDate,1);
    const dst=todosFor(next);
    if(!dst.some(d=>d._origin===it.id)){
      dst.push({id:uid(),text:it.text,state:'open',carriedFrom:viewDate,_origin:it.id,note:''});
    }
    it._rolled=true;
  }
  // a pulled-in (linked) item drives the real checklist item's done state both ways
  if(it.linked && it.src){
    const hit=findCheckItem(it.src.p, it.src.n, it.src.c);
    if(hit){
      if(it.state!=='abandoned' && hit.item.abandoned) clearAbandonFromTask(hit.node, hit.item);
      hit.item.done = (it.state==='completed');
      if(state.activeProjectId===it.src.p) renderTree();
      saveProjectById(it.src.p);
    }
  }
  renderTodos(); scheduleSave();
}
function deleteTodo(id){
  state.todos[viewDate]=todosFor(viewDate).filter(x=>x.id!==id);
  renderTodos(); scheduleSave();
}
function editTodoText(id, text){
  const it=todosFor(viewDate).find(x=>x.id===id); if(!it) return;
  it.text=text.trim()||it.text; scheduleSave();
}

function renderTodos(){
  const isToday = viewDate===todayKey();
  document.getElementById('todoDateLabel').innerHTML =
    (isToday?'<b>Today</b> · ':'') + prettyDate(viewDate);

  const banner=document.getElementById('viewingBanner');
  if(isToday){ banner.style.display='none'; }
  else{
    banner.style.display='flex';
    banner.querySelector('span').textContent='Viewing '+prettyDate(viewDate);
  }

  const ul=document.getElementById('todoList');
  ul.innerHTML='';
  const items=todosFor(viewDate);
  if(!items.length){
    ul.innerHTML='<div class="todo-empty">Nothing here yet. Add a task above.</div>';
    return;
  }
  // keep pulled-in (linked) items in step with the real checklist item they point at
  items.forEach(it=>{
    if(it.linked && it.src){
      const hit=findCheckItem(it.src.p, it.src.n, it.src.c);
      if(!hit){ it.linked=false; delete it.src; }                         // source gone → becomes a normal to-do
      else if(hit.item.abandoned){ it.state='abandoned'; if(!it.reason) it.reason=hit.item.abandonReason||''; }
      else if(it.state==='abandoned'){ it.state='open'; }                 // un-abandoned in the project
      else it.state = hit.item.done ? 'completed' : (it.state==='completed' ? 'open' : it.state);
    }
  });
  items.forEach((it,idx)=>{
    const li=document.createElement('li');
    li.className='todo-item '+(it.state!=='open'?it.state:'');
    li.dataset.idx=idx; li.dataset.id=it.id;
    if(it.state==='abandoned' && it.reason) li.title='Abandoned — reason: '+it.reason;

    const grip=document.createElement('span');
    grip.className='todo-grip'; grip.innerHTML=svg('grip'); grip.title='Drag to reorder';
    grip.addEventListener('mousedown',()=>{ li.draggable=true; });
    grip.addEventListener('mouseup',()=>{ li.draggable=false; });
    li.appendChild(grip);

    const txt=document.createElement('div');
    txt.className='todo-text'; txt.contentEditable='true'; txt.spellcheck=false;
    txt.textContent=it.text;
    txt.addEventListener('blur',()=>editTodoText(it.id,txt.textContent));
    txt.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();txt.blur();} });
    li.appendChild(txt);

    if(it.carriedFrom){
      const c=document.createElement('span');
      c.className='carried'; c.textContent='carried over';
      c.title='Postponed from '+prettyDate(it.carriedFrom);
      li.appendChild(c);
    }

    if(it.linked){
      const l=document.createElement('span'); l.className='linked'; l.innerHTML=svg('layers')+'from project';
      const hit=it.src && findCheckItem(it.src.p, it.src.n, it.src.c);
      if(hit) l.title='Linked to “'+hit.item.text+'” in '+hit.project.name+'. Completing it here ticks it there too.';
      li.appendChild(l);
    }

    const states=document.createElement('div');
    states.className='todo-states';
    states.appendChild(stateBtn('check','done','Mark completed', it.state==='completed', ()=>setTodoState(it.id,'completed')));
    states.appendChild(stateBtn('clock','post','Defer to next day', it.state==='postponed', ()=>setTodoState(it.id,'postponed')));
    states.appendChild(stateBtn('ban','aband','Abandon', it.state==='abandoned', ()=>requestAbandon(it.id)));
    states.appendChild(stateBtn('trash','del','Delete', false, ()=>deleteTodo(it.id)));
    li.appendChild(states);

    setupTodoDrag(li, it.id);
    ul.appendChild(li);
  });
}

/* ---------- to-do drag & drop ---------- */
let todoDragId=null;
function setupTodoDrag(li, id){
  li.addEventListener('dragstart',e=>{
    todoDragId=id; e.dataTransfer.effectAllowed='move';
    setTimeout(()=>li.classList.add('dragging'),0);
  });
  li.addEventListener('dragend',()=>{
    li.classList.remove('dragging'); li.draggable=false; todoDragId=null;
    clearTodoMarks();
  });
  li.addEventListener('dragover',e=>{
    e.preventDefault(); if(!todoDragId||todoDragId===id) return;
    clearTodoMarks();
    const r=li.getBoundingClientRect();
    li.classList.add((e.clientY-r.top) < r.height/2 ? 'drop-before':'drop-after');
  });
  li.addEventListener('dragleave',()=>li.classList.remove('drop-before','drop-after'));
  li.addEventListener('drop',e=>{
    e.preventDefault(); if(!todoDragId||todoDragId===id){ clearTodoMarks(); return; }
    const before=li.classList.contains('drop-before');
    moveTodo(todoDragId, id, before); clearTodoMarks();
  });
}
function clearTodoMarks(){
  document.querySelectorAll('.todo-item.drop-before,.todo-item.drop-after')
    .forEach(el=>el.classList.remove('drop-before','drop-after'));
}
function moveTodo(dragId, targetId, before){
  const list=todosFor(viewDate);
  const from=list.findIndex(x=>x.id===dragId);
  if(from<0) return;
  const [moved]=list.splice(from,1);
  let to=list.findIndex(x=>x.id===targetId);
  if(to<0){ list.push(moved); }
  else{ list.splice(before?to:to+1, 0, moved); }
  renderTodos(); scheduleSave();
}
function stateBtn(icon,cls,title,active,fn){
  const b=document.createElement('button');
  b.className='sbtn '+cls+(active?' active':'');
  b.title=title; b.innerHTML=svg(icon); b.onclick=fn; return b;
}

/* ---------- history popup ---------- */
function openHistory(){
  const box=document.getElementById('histBody');
  box.innerHTML='';
  const keys=Object.keys(state.todos).filter(k=>todosFor(k).length).sort().reverse();
  if(!keys.length){ box.innerHTML='<div class="todo-empty">No past tasks recorded yet.</div>'; }
  keys.forEach(k=>{
    const day=document.createElement('div'); day.className='hist-day';
    const h=document.createElement('h4'); h.textContent=prettyDate(k);
    if(k===todayKey()) h.textContent+='  (today)';
    day.appendChild(h);
    todosFor(k).forEach(it=>{
      const row=document.createElement('div');
      row.className='hist-item '+(it.state!=='open'?it.state:'');
      const tag=document.createElement('span');
      tag.className='tag '+(it.state==='open'?'open':it.state);
      tag.textContent = it.state==='open'?'open':it.state;
      const t=document.createElement('span'); t.className='txt'; t.textContent=it.text;
      row.appendChild(tag); row.appendChild(t);
      day.appendChild(row);
    });
    box.appendChild(day);
  });
  document.getElementById('histScrim').classList.add('open');
}
function closeHistory(){ document.getElementById('histScrim').classList.remove('open'); }

/* ============================================================
   CALENDAR
   ============================================================ */
const MONTHS=['January','February','March','April','May','June','July',
              'August','September','October','November','December'];
const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
let calMode='month';                 // 'month' | 'year'
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();   // 0-11

function dayHasTodos(key){ return (state.todos[key]||[]).length>0; }

/* build the 42-cell (6-week) matrix for a given year/month */
function monthMatrix(year, month){
  const cells=[];
  const startDow=new Date(year,month,1).getDay();
  const daysIn=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  for(let i=0;i<42;i++){
    let dayNum,key,muted=false;
    if(i<startDow){ dayNum=prevDays-startDow+1+i; muted=true; key=ymd(new Date(year,month-1,dayNum)); }
    else if(i>=startDow+daysIn){ dayNum=i-startDow-daysIn+1; muted=true; key=ymd(new Date(year,month+1,dayNum)); }
    else{ dayNum=i-startDow+1; key=ymd(new Date(year,month,dayNum)); }
    cells.push({dayNum,key,muted});
  }
  return cells;
}

function renderCalendar(){
  annotateTree();
  const dots=calendarDots();
  const title=document.getElementById('calTitle');
  const grid=document.getElementById('calGrid');
  const yg=document.getElementById('yearGrid');
  document.getElementById('segMonth').classList.toggle('active',calMode==='month');
  document.getElementById('segYear').classList.toggle('active',calMode==='year');
  const tKey=todayKey();

  if(calMode==='month'){
    grid.style.display='grid'; yg.style.display='none';
    title.textContent=MONTHS[calMonth]+' '+calYear;
    grid.innerHTML='';
    DOW.forEach(d=>{ const h=document.createElement('div'); h.className='cal-dow'; h.textContent=d; grid.appendChild(h); });
    monthMatrix(calYear,calMonth).forEach(c=>{
      const cell=document.createElement('button');
      cell.className='cal-cell'+(c.muted?' muted':'')+(c.key===tKey?' today':'')+(c.key===viewDate?' selected':'');
      cell.textContent=c.dayNum;
      const mlist=dots[c.key];
      if(mlist && mlist.length){
        const wrap=document.createElement('span'); wrap.className='tdots';
        const MAX=4;
        mlist.slice(0,MAX).forEach(t=>{
          const p=document.createElement('span'); p.className='tdot'; p.style.background=t.color; wrap.appendChild(p);
        });
        if(mlist.length>MAX){
          const more=document.createElement('span'); more.className='tmore'; more.textContent='+'+(mlist.length-MAX); wrap.appendChild(more);
        }
        cell.appendChild(wrap);
        cell.title=mlist.map(t=>t.name+(t.start?' ('+t.start+(t.end?'–'+t.end:'')+')':'')).join('\n');
      }
      cell.onclick=()=>selectDate(c.key);
      grid.appendChild(cell);
    });
  }else{
    grid.style.display='none'; yg.style.display='grid';
    title.textContent=String(calYear);
    yg.innerHTML='';
    const now=new Date();
    for(let m=0;m<12;m++){
      const mm=document.createElement('div'); mm.className='mini-month';
      const mt=document.createElement('div');
      mt.className='mini-title'+((m===now.getMonth()&&calYear===now.getFullYear())?' cur':'');
      mt.textContent=MONTHS[m];
      mm.appendChild(mt);
      const dowRow=document.createElement('div'); dowRow.className='mini-dow-row';
      DOW.forEach(d=>{ const e=document.createElement('div'); e.className='mini-dow'; e.textContent=d[0]; dowRow.appendChild(e); });
      mm.appendChild(dowRow);
      const days=document.createElement('div'); days.className='mini-week';
      monthMatrix(calYear,m).forEach(c=>{
        const d=document.createElement('div');
        d.className='mini-day'+(c.muted?' muted':'')+(c.key===tKey?' today':'')+(c.key===viewDate?' selected':'');
        d.textContent=c.dayNum;
        if(!c.muted){
          const ylist=dots[c.key];
          if(ylist && ylist.length){
            const wrap=document.createElement('span'); wrap.className='mtdots';
            const MAX=4;
            ylist.slice(0,MAX).forEach(t=>{
              const p=document.createElement('span'); p.className='mtdot'; p.style.background=t.color; wrap.appendChild(p);
            });
            d.appendChild(wrap);
            d.title=ylist.map(t=>t.name).join('\n');
          }
        }
        d.onclick=()=>{ if(!c.muted){ calMonth=m; selectDate(c.key); } };
        days.appendChild(d);
      });
      mm.appendChild(days);
      mm.querySelector('.mini-title').onclick=()=>{ calMonth=m; calMode='month'; renderCalendar(); };
      yg.appendChild(mm);
    }
  }
}
function selectDate(key){
  viewDate=key;
  // sync calendar view to the selected month
  const [y,m]=key.split('-').map(Number);
  calYear=y; calMonth=m-1;
  renderTodos(); renderCalendar();
}
function calPrev(){
  if(calMode==='month'){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} }
  else calYear--;
  renderCalendar();
}
function calNext(){
  if(calMode==='month'){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} }
  else calYear++;
  renderCalendar();
}
function calToday(){
  const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); calMode='month';
  selectDate(todayKey());
}

    <button class="pt-arrow" id="ptRight" title="Scroll tabs right">${svg('chevR')}</button>
  </div>

  <div class="layout">
    <!-- LEFT : projects -->
    <section class="panel" id="projectPanel">
      <div class="panel-head">
        <div class="title"><span class="dot" style="background:var(--accent)"></span><span id="activeProjName">Project</span></div>
        <span id="roBanner" class="ro-pill" style="display:none">${svg('layers')}View only · managed by a manager</span>
        <div class="spacer"></div>
        <button class="btn" id="btnMinutes" title="Meeting minutes for this project" style="display:none">${svg('notepad')}Meeting minutes</button>
        <button class="btn primary" id="btnAddRoot" title="Add a top-level heading to this project" style="display:none">${svg('plus')}Add heading</button>
      </div>
      <div class="panel-body" id="projContainer"></div>
    </section>

    <!-- TOP RIGHT : personal space (to-do + assigned, side by side) -->
    <section class="panel" id="todoPanel">
      <div class="todo-split">
        <div class="todo-col" id="colPersonal">
          <div class="tc-head">
            <div class="tc-title"><span class="dot" style="background:var(--accent)"></span>${svg('list')}Personal</div>
            <div class="spacer"></div>
            <span id="todoDateLabel" class="todo-date"></span>
            <button class="ibtn accent" id="btnHistory" title="See all past tasks" style="margin-left:4px">${svg('history')}</button>
          </div>
          <div class="tc-body">
            <div id="viewingBanner" class="viewing-banner" style="display:none">
              ${svg('calendar')}<span></span>
              <button class="btn ghost" id="btnBackToday" style="padding:3px 9px;font-size:12px">Back to today</button>
            </div>
            <div class="todo-add">
              <input id="todoInput" type="text" placeholder="Add a task and press Enter…" autocomplete="off">
              <button class="btn primary" id="btnAddTodo">${svg('plus')}Add</button>
            </div>
            <ul id="todoList" class="todo-list"></ul>
          </div>
        </div>
        <div class="todo-col" id="colAssigned">
          <div class="tc-head">
            <div class="tc-title"><span class="dot" style="background:var(--teal)"></span>${svg('users')}Assigned to me</div>
            <div class="spacer"></div>
            <span id="assignedPill" class="pill" style="display:none">0</span>
          </div>
          <div class="tc-body" id="todoAssigned"></div>
        </div>
      </div>
    </section>

    <!-- BOTTOM RIGHT : calendar -->
    <section class="panel" id="calPanel">
      <div class="panel-head">
        <div class="title"><span class="dot" style="background:var(--teal)"></span>Calendar</div>
        <div class="spacer"></div>
        <div class="seg">
          <button id="segMonth">Month</button>
          <button id="segYear">Year</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="cal-head" style="margin-bottom:10px">
          <button class="ibtn" id="calPrev">${svg('chevL')}</button>
          <div class="cal-title" id="calTitle"></div>
          <button class="ibtn" id="calNext">${svg('chevR')}</button>
          <div class="spacer" style="flex:1"></div>
          <button class="btn ghost" id="calToday" style="font-size:12px;padding:5px 10px">Today</button>
        </div>
        <div id="calGrid" class="cal-grid"></div>
        <div id="yearGrid" class="year-grid" style="display:none"></div>
      </div>
    </section>
  </div>

  <!-- TASK MODAL -->
  <div class="scrim" id="taskScrim">
    <div class="modal">
      <div class="modal-head">
        <input type="text" id="tmName" class="modal-title-input" placeholder="Task name" title="Click to edit the task name"><div class="spacer"></div>
        <button class="ibtn" id="tmClose">${svg('x')}</button>
      </div>
      <div class="modal-body">
        <div class="modal-cols">
        <div class="modal-col left">
        <div class="field"><label>Details</label>
          <textarea id="tmDetails" rows="5" placeholder="Specs, requirements, and a description of this task — a shared reference for everyone working on it."></textarea></div>
        <div class="field"><label>Notes</label>
          <textarea id="tmNotes" rows="4" placeholder="Notes that come up as the task progresses…"></textarea></div>
        <div class="field">
          <div class="date-row">
            <div class="dc-col"><label>Start date</label>
              <input type="date" id="tmStartDate"></div>
            <div class="dc-col"><label>End date</label>
              <input type="date" id="tmEndDate"></div>
            <div class="dc-color"><label>Colour</label>
              <div class="circle-wrap">
                <button type="button" class="color-circle" id="tmColorBtn" title="Click to change the calendar colour"></button>
                <button type="button" class="color-reset" id="tmColorReset" title="Reset to the automatic colour">${svg('history')}</button>
                <input type="color" id="tmColor" style="display:none">
              </div>
            </div>
          </div>
          <label class="time-toggle" style="margin-top:12px;margin-bottom:0">
            <input type="checkbox" id="tmHasTime"> Add start / end time</label>
          <div class="dt-row" id="tmTimeRow" style="margin-top:9px;display:none">
            <input type="time" id="tmStart"><span class="color-hint">to</span><input type="time" id="tmEnd">
          </div>
        </div>
        <div class="field"><label>Status</label>
          <div class="state-row">
            <button class="state-pick" id="pick-completed">${svg('check')}Completed</button>
            <button class="state-pick" id="pick-postponed">${svg('clock')}Postponed</button>
            <button class="state-pick" id="pick-abandoned">${svg('ban')}Abandoned</button>
          </div>
        </div>
        <div class="field conditional" id="completionField"><label>Completion details</label>
          <textarea id="tmCompletion" rows="2" placeholder="How / when it was completed…"></textarea></div>
        <div class="field conditional" id="reasonField"><label id="reasonLabel">Reason</label>
          <textarea id="tmReason" rows="2" placeholder="Reason…"></textarea></div>
        </div><!-- /modal-col left -->
        <div class="modal-col right">
          <div class="field checklist-field">
            <label>To-do for this task</label>
            <div class="checklist" id="tmChecklist"></div>
            <div class="checklist-add">
              <input type="text" id="tmCheckInput" placeholder="Add an item and press Enter…" autocomplete="off">
              <button class="btn" id="tmCheckAdd" type="button">${svg('plus')}Add</button>
            </div>
          </div>
        </div><!-- /modal-col right -->
        </div><!-- /modal-cols -->
      </div>
      <div class="modal-foot">
        <button class="btn danger" id="tmDelete">${svg('trash')}Delete task</button>
        <div class="spacer"></div>
        <button class="btn" id="tmCancel">Cancel</button>
        <button class="btn primary" id="tmSave">${svg('check')}Save</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="scrim confirm" id="confirmScrim">
    <div class="modal">
      <div class="modal-head"><h3 id="cfTitle">Confirm</h3></div>
      <div class="modal-body"><p id="cfBody"></p></div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button class="btn" id="cfCancel">Cancel</button>
        <button class="btn primary" id="cfAction" style="background:var(--abandon);border-color:var(--abandon)">Delete</button>
      </div>
    </div>
  </div>

  <!-- HISTORY MODAL -->
  <div class="scrim" id="histScrim">
    <div class="modal">
      <div class="modal-head"><h3>Past tasks</h3><div class="spacer"></div>
        <button class="ibtn" id="histClose">${svg('x')}</button></div>
      <div class="modal-body" id="histBody" style="max-height:60vh"></div>
    </div>
  </div>

  <!-- PROJECTS MANAGER MODAL -->
  <div class="scrim" id="projScrim">
    <div class="modal">
      <div class="modal-head"><h3>Manage projects</h3><div class="spacer"></div>
        <button class="ibtn" id="projMgrClose">${svg('x')}</button></div>
      <div class="modal-body" style="max-height:62vh">
        <div class="proj-mgr-add">
          <input type="text" id="pmNewName" placeholder="New project name" autocomplete="off">
          <button class="btn primary" id="pmAddBtn">${svg('plus')}Add project</button>
        </div>
        <div id="projMgrBody"></div>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button class="btn primary" id="projMgrDone">Done</button>
      </div>
    </div>
  </div>

  <!-- PEOPLE MODAL (manager: names + initials) -->
  <div class="scrim" id="memScrim">
    <div class="modal">
      <div class="modal-head"><h3>People</h3><div class="spacer"></div>
        <button class="ibtn" id="memClose">${svg('x')}</button></div>
      <div class="modal-body" style="max-height:64vh">
        <div class="mem-hint">Set each person's full name and initials. Initials fill in automatically as you type a name (up to 3 letters; duplicates get a number) — you can also type your own. Logins themselves are created in Supabase → Authentication → Users.</div>
        <div id="memBody"></div>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button class="btn primary" id="memDone">Done</button>
      </div>
    </div>
  </div>

  <!-- PROJECT MEMBERS MODAL (manager: who is on this project) -->
  <div class="scrim" id="pmemScrim">
    <div class="modal">
      <div class="modal-head"><h3 id="pmemTitle">Project members</h3><div class="spacer"></div>
        <button class="ibtn" id="pmemClose">${svg('x')}</button></div>
      <div class="modal-body" style="max-height:64vh">
        <div class="mem-hint">Tick everyone who should be able to see and work on this project. People who aren't ticked won't see it at all.</div>
        <input type="text" id="pmemFilter" class="picker-filter" placeholder="Filter by name, initials, or email…" autocomplete="off">
        <div id="pmemList" class="picker-list"></div>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button class="btn" id="pmemCancel">Cancel</button>
        <button class="btn primary" id="pmemSave">${svg('check')}Save members</button>
      </div>
    </div>
  </div>

  <!-- ABANDON REASON MODAL -->
  <div class="scrim" id="abandonScrim">
    <div class="modal" style="width:440px">
      <div class="modal-head"><h3 id="abTitle">Abandon this to-do?</h3><div class="spacer"></div>
        <button class="ibtn" id="abClose">${svg('x')}</button></div>
      <div class="modal-body">
        <div class="field"><label>To-do</label>
          <div id="abItemText" style="font-size:14.5px;color:var(--ink);padding:2px 0;word-break:break-word"></div></div>
        <div class="field"><label>Reason (optional)</label>
          <textarea id="abReason" rows="3" placeholder="Why is this being abandoned? (you can leave this blank)"></textarea></div>
        <div id="abLinkedNote" class="mem-hint" style="display:none;margin:0">This to-do came from a project. Abandoning it crosses it out in that project and records the reason in the task's Notes.</div>
      </div>
      <div class="modal-foot">
        <button class="btn" id="abRestore" style="display:none">${svg('history')}Restore</button>
        <div class="spacer"></div>
        <button class="btn" id="abCancel">Cancel</button>
        <button class="btn primary" id="abConfirm" style="background:var(--abandon);border-color:var(--abandon)">${svg('ban')}Abandon</button>
      </div>
    </div>
  </div>
  <!-- MEETING MINUTES MODAL -->
  <div class="scrim" id="minScrim">
    <div class="modal">
      <div class="modal-head"><h3 id="minTitle">Meeting minutes</h3><div class="spacer"></div>
        <button class="ibtn" id="minClose">${svg('x')}</button></div>
      <div class="modal-body">
        <div class="mm-left">
          <div class="mm-h">New meeting</div>
          <input type="text" id="mmTitleInput" class="mm-title-input" placeholder="Meeting title (e.g. Weekly sync — design)" autocomplete="off">
          <div class="mm-toolbar" id="mmToolbar">
            <button class="mm-tool" type="button" data-cmd="bold" title="Bold"><b>B</b></button>
            <button class="mm-tool" type="button" data-cmd="italic" title="Italic"><i>I</i></button>
            <button class="mm-tool" type="button" data-cmd="h3" title="Heading">H</button>
            <button class="mm-tool" type="button" data-cmd="ul" title="Bullet list">${svg('list')}</button>
            <button class="mm-tool" type="button" data-cmd="ol" title="Numbered list">1.</button>
            <button class="mm-tool" type="button" data-cmd="check" title="Checklist item">${svg('check')}</button>
            <button class="mm-tool" type="button" data-cmd="date" title="Insert today's date">${svg('calendar')}</button>
          </div>
          <div class="mm-editor" id="mmEditor" contenteditable="true" data-ph="Type the meeting minutes here…"></div>
          <div class="mm-save-row">
            <button class="btn ghost" id="mmNew" title="Clear the editor for a new meeting">${svg('plus')}New</button>
            <span class="mm-editing-pill" id="mmEditingPill">${svg('edit')}Editing an existing entry</span>
            <div class="spacer"></div>
            <button class="btn primary" id="mmSave">${svg('save')}Save minutes</button>
          </div>
        </div>
        <div class="mm-right">
          <div class="mm-list-head"><div class="mm-h" style="margin:0">Saved minutes</div></div>
          <div class="mm-list" id="mmList"></div>
        </div>
      </div>
    </div>
  </div>
  `;
}

/* ============================================================
   WIRING + INIT
   ============================================================ */
function wire(){
  projContainer=document.getElementById('projContainer');

  // account / backup
  document.getElementById('btnBackup').onclick=exportJSON;
  document.getElementById('btnSignOut').onclick=doSignOut;

  // login gate
  const authBtn=document.getElementById('authBtn');
  if(authBtn) authBtn.onclick=()=>doSignIn(
    document.getElementById('authEmail').value,
    document.getElementById('authPass').value
  );
  ['authEmail','authPass'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); authBtn && authBtn.click(); } });
  });

  // projects  (manager-only visibility is applied later by reflectPermissions(),
  //            once the signed-in user's role is known)
  document.getElementById('btnAddRoot').onclick=()=>addHeading(null);
  const bMin=document.getElementById('btnMinutes'); if(bMin) bMin.onclick=openMeetingMinutes;
  // project tab strip: scroll arrows + keep the overflow arrows in sync
  const ptL=document.getElementById('ptLeft'), ptR=document.getElementById('ptRight'), ptS=document.getElementById('ptScroll');
  if(ptL) ptL.onclick=()=>{ if(ptS) ptS.scrollBy({left:-240,behavior:'smooth'}); };
  if(ptR) ptR.onclick=()=>{ if(ptS) ptS.scrollBy({left:240,behavior:'smooth'}); };
  if(ptS) ptS.addEventListener('scroll',updateTabArrows);
  window.addEventListener('resize',updateTabArrows);
  const btnProjects=document.getElementById('btnProjects');
  if(btnProjects) btnProjects.onclick=openProjectManager;
  const btnPeople=document.getElementById('btnPeople');
  if(btnPeople) btnPeople.onclick=openMembersModal;
  document.getElementById('projMgrClose').onclick=closeProjectManager;
  document.getElementById('projMgrDone').onclick=closeProjectManager;
  document.getElementById('pmAddBtn').onclick=()=>{
    const inp=document.getElementById('pmNewName'); addProject(inp.value); inp.value=''; inp.focus();
  };
  document.getElementById('pmNewName').addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); const inp=e.target; addProject(inp.value); inp.value=''; }
  });

  // todo
  const input=document.getElementById('todoInput');
  document.getElementById('btnAddTodo').onclick=()=>{ addTodo(input.value); input.value=''; input.focus(); };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){ addTodo(input.value); input.value=''; } });
  document.getElementById('btnHistory').onclick=openHistory;
  document.getElementById('btnBackToday').onclick=()=>{ selectDate(todayKey()); };

  // meeting minutes
  document.getElementById('minClose').onclick=closeMeetingMinutes;
  document.getElementById('mmSave').onclick=saveCurrentMinutes;
  document.getElementById('mmNew').onclick=mmNewEntry;
  document.getElementById('mmToolbar').addEventListener('mousedown',e=>{
    const b=e.target.closest('.mm-tool'); if(!b) return;
    e.preventDefault();                       // keep the caret in the editor
    mmExec(b.dataset.cmd);
  });
  // tick checklist boxes inside the draft editor…
  document.getElementById('mmEditor').addEventListener('click',e=>{
    const box=e.target.closest('.mm-box'); if(!box) return;
    const task=box.closest('.mm-task'); if(!task) return;
    task.dataset.done = task.dataset.done==='1' ? '0' : '1';
  });
  // …and inside a saved entry (persists just that entry)
  document.getElementById('mmList').addEventListener('click',e=>{
    const box=e.target.closest('.mm-box'); if(!box) return;
    const task=box.closest('.mm-task'); if(!task) return;
    task.dataset.done = task.dataset.done==='1' ? '0' : '1';
    const bodyEl=box.closest('.mm-entry-body');
    if(bodyEl && bodyEl.dataset.mid && mmProjectId){
      const m=meetingsOf(mmProjectId).find(x=>x.id===bodyEl.dataset.mid);
      if(m){ m.body=sanitizeHtml(bodyEl.innerHTML); saveProjectById(mmProjectId); }
    }
  });

  // people modal
  document.getElementById('memClose').onclick=closeMembersModal;
  document.getElementById('memDone').onclick=closeMembersModal;

  // project-members modal
  document.getElementById('pmemClose').onclick=closeProjMembers;
  document.getElementById('pmemCancel').onclick=closeProjMembers;
  document.getElementById('pmemSave').onclick=saveProjMembers;
  document.getElementById('pmemFilter').addEventListener('input',e=>renderProjMembers(e.target.value));

  // abandon-reason modal
  document.getElementById('abClose').onclick=closeAbandon;
  document.getElementById('abCancel').onclick=closeAbandon;
  document.getElementById('abConfirm').onclick=confirmAbandon;
  document.getElementById('abRestore').onclick=restoreAbandon;

  // calendar
  document.getElementById('segMonth').onclick=()=>{ calMode='month'; renderCalendar(); };
  document.getElementById('segYear').onclick=()=>{ calMode='year'; renderCalendar(); };
  document.getElementById('calPrev').onclick=calPrev;
  document.getElementById('calNext').onclick=calNext;
  document.getElementById('calToday').onclick=calToday;

  // task modal
  document.getElementById('tmClose').onclick=closeTaskModal;
  document.getElementById('tmCancel').onclick=closeTaskModal;
  document.getElementById('tmSave').onclick=saveTaskModal;
  document.getElementById('tmHasTime').onchange=function(){
    setTimeVisible(this.checked);
    if(this.checked){
      const s=document.getElementById('tmStart'), e=document.getElementById('tmEnd');
      if(!s.value) s.value='09:00';
      if(!e.value) e.value='10:00';
    }
  };
  document.getElementById('tmColorBtn').onclick=()=>document.getElementById('tmColor').click();
  document.getElementById('tmColor').oninput=function(){
    modalColor=this.value;
    document.getElementById('tmColorBtn').style.background=modalColor;
    document.getElementById('tmColorReset').style.display='';
  };
  document.getElementById('tmColorReset').onclick=()=>{
    const f=findNode(modalNodeId); const auto=(f&&f.node._autoHex)||'#1746e0';
    modalColor='';
    document.getElementById('tmColor').value=auto;
    document.getElementById('tmColorBtn').style.background=auto;
    document.getElementById('tmColorReset').style.display='none';
  };
  document.getElementById('tmCheckAdd').onclick=addCheckItem;
  document.getElementById('tmCheckInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); addCheckItem(); }
  });
  document.getElementById('tmDelete').onclick=requestDeleteTask;
  document.getElementById('pick-completed').onclick=()=>pickState('completed');
  document.getElementById('pick-postponed').onclick=()=>pickState('postponed');
  document.getElementById('pick-abandoned').onclick=()=>pickState('abandoned');

  // confirm modal
  document.getElementById('cfCancel').onclick=closeConfirm;
  document.getElementById('cfAction').onclick=runConfirm;

  // history modal
  document.getElementById('histClose').onclick=closeHistory;

  // close modals on scrim click / Esc (the minutes editor is protected so a draft isn't lost)
  document.querySelectorAll('.scrim').forEach(s=>{
    s.addEventListener('mousedown',e=>{ if(s.id==='minScrim') return; if(e.target===s) s.classList.remove('open'); });
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') document.querySelectorAll('.scrim.open').forEach(s=>{ if(s.id!=='minScrim') s.classList.remove('open'); });
  });

  // when focus leaves an editor, apply any realtime updates that were deferred
  document.addEventListener('focusout',()=>setTimeout(flushPendingRealtime,60));
}

function renderAll(){
  renderProjectSelect(); renderTree(); renderCalendar();
  renderTodos(); renderAssigned();
}

async function init(){
  buildShell();
  wire();

  // No config yet → show the gate with a helpful message instead of a broken app.
  if(!sb){
    showAuthGate();
    showAuthError('App is not configured. Open this file and set SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY at the top of the script.');
    return;
  }

  // Resume an existing session if there is one; otherwise show the login gate.
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ await enterApp(); }
    else { showAuthGate(); }
  }catch(e){
    showAuthGate();
    showAuthError('Could not reach the sign-in service. Check your connection and try again.');
  }

  // React to sign-out / token expiry happening in another tab.
  sb.auth.onAuthStateChange((event)=>{
    if(event==='SIGNED_OUT'){ location.reload(); }
  });
}
document.addEventListener('DOMContentLoaded',init);
})();

</script>
